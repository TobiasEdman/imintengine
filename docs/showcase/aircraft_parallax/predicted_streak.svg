<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Space Grotesk, system-ui, sans-serif">
  <defs>
    <radialGradient id="aircraft-glow">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="winterland" patternUnits="userSpaceOnUse" width="20" height="20">
      <rect width="20" height="20" fill="#3a4f5a"/>
      <circle cx="5" cy="5" r="1" fill="#506570" opacity="0.5"/>
      <circle cx="15" cy="13" r="1.2" fill="#506570" opacity="0.4"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="#fafafa"/>

  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="600" fill="#171717">Förväntad signatur i RGB-kompositen</text>
  <text x="400" y="50" text-anchor="middle" font-size="12" fill="#6b7280">Stridsflygplan över Hisingen 2026-01-11 — predicerat utseende baserat på sensorfysiken</text>

  <!-- Background tile (winter Hisingen) -->
  <rect x="80" y="80" width="640" height="320" fill="url(#winterland)" stroke="#171717" stroke-width="1.5"/>
  <text x="92" y="100" font-size="10" fill="#fff" opacity="0.6">2026-01-11 10:43:19 UTC · 5×5 km · 57.71818°N 11.66559°E</text>

  <!-- Vinterns låga sol — softer light -->

  <!-- Aircraft trail: blue, green, red, NIR-magenta separated copies -->
  <!-- B02 (blue) at first position -->
  <ellipse cx="220" cy="240" rx="9" ry="3" fill="#1565c0" opacity="0.85" transform="rotate(-15 220 240)"/>
  <text x="220" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#1565c0">B02 · t₀</text>

  <!-- B03 (green) ~14 px later -->
  <ellipse cx="362" cy="201" rx="9" ry="3" fill="#43a047" opacity="0.85" transform="rotate(-15 362 201)"/>
  <text x="362" y="184" text-anchor="middle" font-size="10" font-weight="600" fill="#43a047">B03 · +0.5s</text>

  <!-- B04 (red) ~17 px later -->
  <ellipse cx="392" cy="193" rx="9" ry="3" fill="#e53935" opacity="0.85" transform="rotate(-15 392 193)"/>
  <text x="392" y="172" text-anchor="middle" font-size="10" font-weight="600" fill="#e53935">B04 · +0.6s</text>

  <!-- B08 (NIR — render as bright magenta/pink to indicate NIR) ~29 px later -->
  <ellipse cx="513" cy="160" rx="11" ry="4" fill="#ec407a" opacity="0.95" transform="rotate(-15 513 160)"/>
  <circle cx="513" cy="160" r="22" fill="url(#aircraft-glow)"/>
  <text x="513" y="138" text-anchor="middle" font-size="10" font-weight="600" fill="#ec407a">B08 NIR · +1.0s</text>

  <!-- Connecting trajectory line -->
  <line x1="220" y1="240" x2="513" y2="160" stroke="#fff" stroke-width="0.8" stroke-dasharray="2,3" opacity="0.5"/>

  <!-- Velocity annotation -->
  <text x="367" y="290" text-anchor="middle" font-size="11" fill="#fff" opacity="0.8">Markförflyttning: ~290 m mellan B02 och B08</text>
  <text x="367" y="305" text-anchor="middle" font-size="11" fill="#fff" opacity="0.8">Pixel-offset: ~29 px @ 10 m upplösning</text>

  <!-- Hisingen reference label -->
  <text x="92" y="390" font-size="10" fill="#fff" opacity="0.7">Hisingen / Säve riktning</text>

  <!-- Legend below image -->
  <g transform="translate(80, 420)">
    <rect x="0" y="0" width="640" height="60" fill="#fff" stroke="#d1d5db"/>
    <text x="320" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#171717">Varför syns NIR (B08) starkast?</text>
    <text x="320" y="40" text-anchor="middle" font-size="11" fill="#6b7280">Flygplan = stark NIR-reflektor (metallisk yta) mot vinterns dämpade NIR-bakgrund.</text>
    <text x="320" y="55" text-anchor="middle" font-size="11" fill="#6b7280">B08-kopian är därför ofta tydligast — och längst bort från B02-kopian.</text>
  </g>
</svg>
