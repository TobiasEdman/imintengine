<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Space Grotesk, system-ui, sans-serif">
  <defs>
    <radialGradient id="aircraft-glow">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="winterland" patternUnits="userSpaceOnUse" width="20" height="20">
      <rect width="20" height="20" fill="#3a4f5a"/>
      <circle cx="5" cy="5" r="1" fill="#506570" opacity="0.5"/>
      <circle cx="15" cy="13" r="1.2" fill="#506570" opacity="0.4"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="#fafafa"/>

  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="600" fill="#171717">Förväntad signatur i RGB-kompositen</text>
  <text x="400" y="50" text-anchor="middle" font-size="12" fill="#6b7280">Pilatus PC-24 climb-cruise (~220 m/s) över Öckerö-skärgården 2026-01-11</text>

  <!-- Background tile -->
  <rect x="80" y="80" width="640" height="320" fill="url(#winterland)" stroke="#171717" stroke-width="1.5"/>
  <text x="92" y="100" font-size="10" fill="#fff" opacity="0.6">2026-01-11 10:43:19 UTC · 5×5 km · 57.71818°N 11.66559°E (Öckerö-skärgården)</text>

  <!-- Aircraft trail: blue, NIR, green, red separated copies (focal plane order B02→B08→B03→B04) -->
  <!-- B02 (blue) at first position -->
  <ellipse cx="220" cy="240" rx="9" ry="3" fill="#1565c0" opacity="0.85" transform="rotate(-15 220 240)"/>
  <text x="220" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#1565c0">B02 · t₀</text>

  <!-- B08 (NIR magenta) ~6 px later -->
  <ellipse cx="277" cy="225" rx="11" ry="4" fill="#ec407a" opacity="0.95" transform="rotate(-15 277 225)"/>
  <circle cx="277" cy="225" r="20" fill="url(#aircraft-glow)"/>
  <text x="277" y="208" text-anchor="middle" font-size="10" font-weight="600" fill="#ec407a">B08 NIR · +0.260 s</text>

  <!-- B03 (green) ~12 px later -->
  <ellipse cx="335" cy="208" rx="9" ry="3" fill="#43a047" opacity="0.85" transform="rotate(-15 335 208)"/>
  <text x="335" y="190" text-anchor="middle" font-size="10" font-weight="600" fill="#43a047">B03 · +0.521 s</text>

  <!-- B04 (red) ~22 px later -->
  <ellipse cx="430" cy="180" rx="9" ry="3" fill="#e53935" opacity="0.85" transform="rotate(-15 430 180)"/>
  <text x="430" y="162" text-anchor="middle" font-size="10" font-weight="600" fill="#e53935">B04 · +0.999 s</text>

  <!-- Anslutande flygbana -->
  <line x1="220" y1="240" x2="430" y2="180" stroke="#fff" stroke-width="0.8" stroke-dasharray="2,3" opacity="0.5"/>

  <!-- Velocity annotation -->
  <text x="325" y="290" text-anchor="middle" font-size="11" fill="#fff" opacity="0.85">Markförflyttning: ~220 m mellan B02 och B04</text>
  <text x="325" y="305" text-anchor="middle" font-size="11" fill="#fff" opacity="0.85">Pixel-offset: ~22 px @ 10 m upplösning</text>
  <text x="325" y="320" text-anchor="middle" font-size="11" fill="#fff" opacity="0.85">Fokalplansordning: B02 → B08 → B03 → B04</text>

  <!-- Heading -->
  <text x="92" y="390" font-size="10" fill="#fff" opacity="0.7">Heading 051° (NÖ) · Säve→ESOW initial bäring 51.7° · matchar inom 1°</text>

  <!-- Legend below image -->
  <g transform="translate(80, 420)">
    <rect x="0" y="0" width="640" height="60" fill="#fff" stroke="#d1d5db"/>
    <text x="320" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#171717">Varför ser vi kondensstrimma från en PC-24?</text>
    <text x="320" y="40" text-anchor="middle" font-size="11" fill="#6b7280">Schmidt-Appleman: T ≤ −40°C + is-mättnad → typiskt ≥ 5–8 km flyghöjd.</text>
    <text x="320" y="55" text-anchor="middle" font-size="11" fill="#6b7280">PC-24 service ceiling 13.7 km — climb genom kondensstrimma-höjder ~3 min efter takeoff.</text>
  </g>
</svg>
