    <!-- S2 ground track direction (north, descending → roughly N-S along-track) -->
    <line x1="220" y1="200" x2="220" y2="50" stroke="#1565c0" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow2)"/>
    <text x="226" y="125" font-size="8" fill="#1565c0" opacity="0.8">S2 along-track</text>
