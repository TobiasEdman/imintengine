apiVersion: batch/v1
kind: Job
metadata:
  name: orphan-retry40-des
  namespace: prithvi-training-default
  labels:
    app: ensemble-prep
    purpose: orphan-retry40-des
spec:
  backoffLimit: 0
  # 2026-07-20: DES-retry of the 40 "dates_ok" tiles from
  # orphan_101_classification_20260720.json (user decision: katalogisera
  # 61 written-off, retry 40). They had clean gate-passing dates but
  # failed downstream in the recovery run — transient errors should land
  # now; genuine DES-mirror-gaps fail again and stay catalogued.
  #
  # Startup generates /data/audits/orphan_retry40_20260720.json (fetch
  # input) + orphan_final_fails_20260720.json (catalogue) from the
  # classification report — the dashboard pod mounts /data read-only so
  # they cannot be written from there.
  #
  # --workers 2 == DES-allotment senast user-bekräftad (07-09; retry
  # sanktionerad "kör som du rekommenderar" 07-20). SCL-screens är
  # cachade (/data/scl_fracs_cache) så körningen är nästan ren spektral.
  # Skriver ENDAST nya npz (de 40 saknade) + audits — kolliderar inte
  # med build-labels-orphans-r2 som skriver de 1046 existerande.
  activeDeadlineSeconds: 86400
  ttlSecondsAfterFinished: 172800
  template:
    metadata:
      labels:
        app: ensemble-prep
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  # p02r09srv04 + srv06 fail pod-sandbox creation (runc bug)
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: ["p02r09srv04", "p02r09srv06"]
      containers:
        - name: retry-fetch
          image: python:3.11-slim
          command:
            - bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              echo "=== orphan retry: 40 dates_ok tiles (DES, claim-coordinated) ==="
              echo "Started: $(date)"
              apt-get update -qq && apt-get install -y -qq \
                git libgdal-dev gdal-bin > /dev/null 2>&1
              pip install -q --no-cache-dir \
                numpy scipy rasterio pyproj requests Pillow \
                pystac-client openeo shapely xarray netcdf4 2>&1 | tail -2

              mkdir -p /workspace && cd /workspace
              git clone --depth 1 --branch main \
                https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine
              export PYTHONPATH=/workspace/imintengine:${PYTHONPATH:-}
              echo "CLONED main HEAD: $(git rev-parse --short HEAD)"
              git grep -q 'claim-dir' scripts/fetch_unified_tiles.py \
                && echo "OK: claim coordination present" \
                || { echo "FATAL: claim fix NOT in clone — abort"; exit 1; }
              cp /etc/skg/skg_endpoints /workspace/imintengine/.skg_endpoints

              python3 - <<'PYEOF'
              import json
              cls = json.load(open("/data/audits/orphan_101_classification_20260720.json"))
              expected = {e["name"]: e for e in json.load(open("/data/audits/orphan_fetch_512.json"))}
              retry = [expected[n] for n, t in cls["tiles"].items() if t["verdict"] == "dates_ok"]
              with open("/data/audits/orphan_retry40_20260720.json", "w") as f:
                  json.dump(retry, f, indent=1)
              cat = {"generated": "2026-07-20",
                     "source": "orphan_101_classification_20260720.json + user decision 2026-07-20",
                     "policy": "orphan_fetch_512.json lamnas orord (proveniens + idempotent fetch-input)",
                     "tiles": {n: {"verdict": t["verdict"], "year": t["year"],
                                   "claim_stuck": t.get("claim_stuck", False),
                                   "status": "retry_pending" if t["verdict"] == "dates_ok" else "written_off"}
                               for n, t in cls["tiles"].items()}}
              with open("/data/audits/orphan_final_fails_20260720.json", "w") as f:
                  json.dump(cat, f, indent=1)
              print(f"retry list: {len(retry)} tiles; catalogue: {len(cat['tiles'])}")
              PYEOF

              OUT=/data/unified_v2_512_orphans_staging
              echo "Staged before retry: $(ls $OUT/*.npz 2>/dev/null | wc -l)"
              python3 scripts/fetch_unified_tiles.py \
                --mode refetch \
                --from-json /data/audits/orphan_retry40_20260720.json \
                --output-dir "$OUT" \
                --tile-size-px 512 \
                --years 2018 2019 2021 2022 2023 \
                --workers 2 \
                --fetch-sources des \
                --no-pre2018 \
                --claim-dir "$OUT/.claims" \
                --claim-stale-h 1 \
                --scl-backend des

              echo "Staged after retry: $(ls $OUT/*.npz 2>/dev/null | wc -l)"
              echo "=== retry complete: $(date) ==="
              echo 'CAMPAIGN_GATE_VERDICT={"gate":"orphan-retry40-des","ok":true,"reason":"retry pass done"}'
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: FETCH_BACKEND_LABEL
              value: "des"
            - name: VPP_SOURCE
              value: "wekeo"
            - name: VPP_WEKEO_DIR
              value: "/data/vpp_wekeo"
            - name: SCL_FRACS_CACHE
              value: "/data/scl_fracs_cache"
            - name: DES_USER
              valueFrom:
                secretKeyRef:
                  name: des-credentials
                  key: user
            - name: DES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: des-credentials
                  key: password
          envFrom:
            - secretRef:
                name: wekeo-creds
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
            limits:
              cpu: "4"
              memory: "16Gi"
          volumeMounts:
            - name: training-data
              mountPath: /data
            - name: skg-endpoints
              mountPath: /etc/skg
              readOnly: true
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data-cephfs
        - name: skg-endpoints
          secret:
            secretName: skg-endpoints
