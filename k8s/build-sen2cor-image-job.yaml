apiVersion: batch/v1
kind: Job
metadata:
  name: build-sen2cor-image
  namespace: prithvi-training-default
  labels:
    app: ensemble-prep
    purpose: build-sen2cor-image
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 3600
  template:
    metadata:
      labels:
        app: ensemble-prep
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: ["p02r09srv04"]
      containers:
        - name: kaniko
          image: gcr.io/kaniko-project/executor:v1.23.2-debug
          # Native amd64 — no Rosetta emulation issues from the
          # 2026-05-13 local-build attempt.
          # Build the Dockerfile from a sub-path of the imint repo,
          # push the resulting image to ghcr.io/tobiasedman/imint-sen2cor:2.12.04
          # using the docker-registry secret (ghcr-push) just created.
          args:
            - --dockerfile=docker/sen2cor/Dockerfile
            # ``#refs/heads/main`` pins to the main branch HEAD — the
            # default kaniko-context behaviour reads HEAD which on
            # github.com/TobiasEdman/ImintEngine.git resolves to
            # 'master' (an old branch), missing the actual Dockerfile
            # fixes on main.
            - --context=https://github.com/TobiasEdman/ImintEngine.git#refs/heads/main
            - --destination=ghcr.io/tobiasedman/imint-sen2cor:2.12.04
            - --cleanup
            - --snapshot-mode=redo
            - --use-new-run
          volumeMounts:
            - name: ghcr-config
              mountPath: /kaniko/.docker
              readOnly: true
          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
      volumes:
        - name: ghcr-config
          secret:
            secretName: ghcr-push
            items:
              - key: .dockerconfigjson
                path: config.json
