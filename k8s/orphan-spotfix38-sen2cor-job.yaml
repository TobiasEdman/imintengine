apiVersion: batch/v1
kind: Job
metadata:
  name: orphan-spotfix38-sen2cor
  namespace: prithvi-training-default
  labels:
    app: ensemble-prep
    purpose: orphan-spotfix38-sen2cor
spec:
  backoffLimit: 0
  # 2026-07-21 spot-fix: whole-tile fetch of the 38 written-off-after-retry
  # orphan tiles (orphan_final_fails_20260720.json) via the l1c_sen2cor
  # backend — CDSE-STAC existence -> GCS L1C SAFE -> local sen2cor L2A.
  # PU-FREE and DES-mirror-independent: these tiles had gate-passing
  # dates but failed the DES download path twice (recovery + retry).
  # Fetches into the (now empty) orphans staging; labels + additive merge
  # follow as separate gated jobs (build-labels --max-failed 0, then
  # merge_orphan_staging.py).
  #
  # WALL-TIME: up to 38 tiles x 4 slots x (~0.8 GB SAFE + sen2cor
  # 10-60 min)/3 workers — resume-safe (idempotent skip + claims), 2d cap.
  activeDeadlineSeconds: 172800
  ttlSecondsAfterFinished: 172800
  template:
    metadata:
      labels:
        app: ensemble-prep
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-push
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  # p02r09srv04 + srv06 fail pod-sandbox creation (runc bug)
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: ["p02r09srv04", "p02r09srv06"]
      containers:
        - name: spotfix
          # imint-sen2cor carries L2A_Process (digest-pinned per docker-skew rule)
          image: ghcr.io/tobiasedman/imint-sen2cor@sha256:528adef18445404c6f491ff2f8a81f3d75f908280704d69c2c507f820f59de28
          command:
            - bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              echo "=== orphan spot-fix: 38 written-off tiles via l1c_sen2cor ==="
              echo "Started: $(date)"
              apt-get update -qq && apt-get install -y -qq \
                git python3 python3-pip libgdal-dev gdal-bin > /dev/null 2>&1
              # scipy REQUIRED for estimate_mi_offset (coreg M2 in-fetch)
              pip3 install --quiet --no-cache-dir \
                numpy scipy rasterio pyproj requests Pillow \
                pystac-client openeo shapely xarray netcdf4 2>&1 | tail -2

              mkdir -p /workspace && cd /workspace
              git clone --depth 1 --branch main \
                https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine
              export PYTHONPATH=/workspace/imintengine:${PYTHONPATH:-}
              echo "CLONED main HEAD: $(git rev-parse --short HEAD)"
              echo "L2A_Process on PATH: $(which L2A_Process)"
              cp /etc/skg/skg_endpoints /workspace/imintengine/.skg_endpoints

              python3 - <<'PYEOF'
              import json
              cat = json.load(open("/data/audits/orphan_final_fails_20260720.json"))
              expected = {e["name"]: e for e in json.load(open("/data/audits/orphan_fetch_512.json"))}
              spot = [expected[n] for n, t in cat["tiles"].items()
                      if t["status"] == "written_off_after_retry"]
              with open("/data/audits/orphan_spotfix_20260721.json", "w") as f:
                  json.dump(spot, f, indent=1)
              print(f"spot-fix list: {len(spot)} tiles")
              PYEOF

              OUT=/data/unified_v2_512_orphans_staging
              echo "Staged before: $(ls $OUT/*.npz 2>/dev/null | wc -l)"
              python3 scripts/fetch_unified_tiles.py \
                --mode refetch \
                --from-json /data/audits/orphan_spotfix_20260721.json \
                --output-dir "$OUT" \
                --tile-size-px 512 \
                --years 2018 2019 2021 2022 2023 \
                --workers 3 \
                --fetch-sources l1c_sen2cor \
                --claim-dir "$OUT/.claims" \
                --claim-stale-h 1 \
                --scl-backend des

              echo "Staged after: $(ls $OUT/*.npz 2>/dev/null | wc -l)"
              echo "=== spot-fix fetch complete: $(date) ==="
              echo 'CAMPAIGN_GATE_VERDICT={"gate":"orphan-spotfix38-sen2cor","ok":true,"reason":"sen2cor spot-fix pass done"}'
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: FETCH_BACKEND_LABEL
              value: "l1c_sen2cor"
            - name: VPP_SOURCE
              value: "wekeo"
            - name: VPP_WEKEO_DIR
              value: "/data/vpp_wekeo"
            - name: SCL_FRACS_CACHE
              value: "/data/scl_fracs_cache"
            - name: SEN2COR_SAFE_CACHE
              value: "/data/sen2cor_cache"
            - name: DES_USER
              valueFrom:
                secretKeyRef:
                  name: des-credentials
                  key: user
            - name: DES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: des-credentials
                  key: password
          envFrom:
            - secretRef:
                name: wekeo-creds
          resources:
            requests:
              cpu: "16"
              memory: "32Gi"
            limits:
              cpu: "16"
              memory: "32Gi"
          volumeMounts:
            - name: training-data
              mountPath: /data
            - name: skg-endpoints
              mountPath: /etc/skg
              readOnly: true
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data-cephfs
        - name: skg-endpoints
          secret:
            secretName: skg-endpoints
