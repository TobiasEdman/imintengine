# Parametric unified training job template.
#
# Replaces the per-run yamls (unified-train-v5a, v6a, ...). Substitute
# placeholders with envsubst at apply time:
#
#   RUN_ID=v7-clay BACKBONE_NAME=clay_v1_5 \
#     envsubst '$RUN_ID $BACKBONE_NAME $IMG_SIZE $BATCH_SIZE $EPOCHS' \
#     < k8s/unified-train-template.yaml | kubectl apply -f -
#
# Required env:
#   RUN_ID         — kebab-case suffix; job is named `unified-train-${RUN_ID}`,
#                    checkpoints land in `/checkpoints/unified_${RUN_ID//-/_}/`
#   BACKBONE_NAME  — registry key from imint.fm.registry.MODEL_CONFIGS
#                    (prithvi_300m | prithvi_600m | terramind_v1_base |
#                     clay_v1_5 | croma_base | thor_v1_base)
#
# Optional env (defaults match the v6a baseline):
#   IMG_SIZE       — default 256; set before envsubst to override
#   BATCH_SIZE     — default 32  (H100-optimized; sqrt-scaled lr ⇒ 3e-4)
#   LR             — default 3e-4
#   EPOCHS         — default 10
#
# All optional vars MUST be set in the shell calling envsubst. Bash-style
# defaults (${VAR:-default}) don't work here because envsubst does not
# implement that syntax and mangles the value. Use the wrapper in
# scripts/launch_train.sh (or set defaults inline before envsubst).
#
# Training knobs below are tuned for H100 80GB with BF16 autocast + TF32
# enabled in imint.training.trainer (see docs/training/hyperparameters.md).
apiVersion: batch/v1
kind: Job
metadata:
  name: unified-train-${RUN_ID}
  namespace: prithvi-training-default
  labels:
    app: unified-training
    run-id: "${RUN_ID}"
    backbone: "${BACKBONE_NAME}"
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 43200  # 12 h
  template:
    metadata:
      labels:
        app: unified-training
        run-id: "${RUN_ID}"
        backbone: "${BACKBONE_NAME}"
    spec:
      restartPolicy: Never
      nodeSelector:
        accelerator: nvidia-h100
      containers:
        - name: trainer
          image: python:3.11-slim
          command:
            - /bin/bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              # Reuse PVC-backed weights cache from cache-fm-weights job.
              export HF_HOME=/data/model_cache/hf
              export HUGGINGFACE_HUB_CACHE=/data/model_cache/hf
              export TORCH_HOME=/data/model_cache/torch

              echo "=== unified-train-${RUN_ID} (backbone=${BACKBONE_NAME}) ==="
              TILE_COUNT=$(ls /data/unified_v2_512/*.npz 2>/dev/null | wc -l)
              echo "Unified tiles: $TILE_COUNT"
              if [ "$TILE_COUNT" -lt 100 ]; then
                echo "ERROR: Not enough tiles in /data/unified_v2_512/"
                exit 1
              fi

              apt-get update -qq && apt-get install -y -qq git > /dev/null 2>&1
              pip install --quiet --no-cache-dir torch torchvision \
                --index-url https://download.pytorch.org/whl/cu121
              pip install --quiet --no-cache-dir \
                timm numpy scipy scikit-learn huggingface_hub safetensors

              CKPT_DIR=/checkpoints/unified_${RUN_ID//-/_}
              mkdir -p "$CKPT_DIR"
              rm -f "$CKPT_DIR"/*.pt.tmp 2>/dev/null || true

              echo "Cloning ImintEngine..."
              mkdir -p /workspace && cd /workspace
              git clone --depth 1 https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine
              pip install --no-cache-dir -e . || \
                pip install --quiet --no-cache-dir -r requirements.txt

              # Per-family deps. Fail fast if the requested backbone
              # needs a missing extra — quieter to crash here than to
              # burn H100 minutes discovering it later.
              case "${BACKBONE_NAME}" in
                terramind_*|clay_*|thor_*)
                  pip install --quiet --no-cache-dir terratorch
                  ;;
              esac
              if [ "${BACKBONE_NAME}" = "clay_v1_5" ]; then
                pip install --quiet --no-cache-dir \
                  "git+https://github.com/Clay-foundation/model.git"
              fi
              if [ "${BACKBONE_NAME}" = "croma_base" ]; then
                # CROMA — source-only; clone to /workspace/CROMA and
                # expose via PYTHONPATH.
                if [ ! -d /workspace/CROMA ]; then
                  git clone --depth 1 https://github.com/antofuller/CROMA \
                    /workspace/CROMA
                fi
                export PYTHONPATH=/workspace/CROMA:${PYTHONPATH:-}
              fi
              if [ "${BACKBONE_NAME}" = "thor_v1_base" ]; then
                pip install --quiet --no-cache-dir \
                  "git+https://github.com/FM4CS/THOR.git#subdirectory=terratorch_ext"
              fi

              cd /data
              echo "Starting training: ${BACKBONE_NAME} → $CKPT_DIR"
              python /workspace/imintengine/scripts/train_unified.py \
                --backbone-name ${BACKBONE_NAME} \
                --data-dirs /data/unified_v2_512 \
                --checkpoint-dir "$CKPT_DIR" \
                --num-classes 23 \
                --enable-multitemporal \
                --num-temporal-frames 4 \
                --epochs ${EPOCHS} \
                --batch-size ${BATCH_SIZE} \
                --lr ${LR} \
                --weight-decay 0.35 \
                --unfreeze-layers 6 \
                --backbone-lr-factor 0.1 \
                --loss-type focal_dice \
                --focal-gamma 2.0 \
                --patch-size ${IMG_SIZE} \
                --img-size ${IMG_SIZE} \
                --weighting-method sqrt \
                --label-smoothing 0.05 \
                --lovasz-weight 0.3 \
                --patience 20 \
                --num-workers 16 \
                --device cuda

          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: RUN_ID
              value: "${RUN_ID}"
            - name: BACKBONE_NAME
              value: "${BACKBONE_NAME}"
            - name: IMG_SIZE
              value: "${IMG_SIZE}"
            - name: BATCH_SIZE
              value: "${BATCH_SIZE}"
            - name: LR
              value: "${LR}"
            - name: EPOCHS
              value: "${EPOCHS}"
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          resources:
            requests:
              cpu: "48"
              memory: "192Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "48"
              memory: "192Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: training-data
              mountPath: /data
            - name: checkpoints
              mountPath: /checkpoints
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data-cephfs
        - name: checkpoints
          persistentVolumeClaim:
            claimName: training-checkpoints
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 32Gi
