apiVersion: batch/v1
kind: Job
metadata:
  name: enrich-tessera-256
  namespace: prithvi-training-default
  labels:
    app: ensemble-prep
    purpose: tessera-256-enrichment
spec:
  backoffLimit: 0
  # 8290 tiles in unified_v2. Tessera 512 done in 110 min for 7094
  # tiles via 4 workers + LRU guard (Done: 4344 OK + 2678 skip + 62
  # fail). Same workload sized for 256 — assume ~150 min if cache
  # is empty, less if blocks already on disk from the 512 run.
  # 6h cap with margin.
  activeDeadlineSeconds: 21600
  template:
    metadata:
      labels:
        app: ensemble-prep
    spec:
      restartPolicy: Never
      containers:
        - name: t
          image: python:3.11-slim
          command:
            - /bin/bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              echo "=== TESSERA 256 enrichment (LRU-bounded cache) ==="
              echo "Started: $(date)"

              apt-get update -qq && apt-get install -y -qq \
                git libgdal-dev gdal-bin > /dev/null 2>&1
              pip install --quiet --no-cache-dir \
                numpy scipy rasterio pyproj pyyaml geotessera

              mkdir -p /workspace && cd /workspace
              git clone --depth 1 \
                https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine

              echo ""
              echo "Verifying LRU guard fix is in cloned source:"
              grep -n "request_stop" scripts/enrich_tiles_tessera.py | head -2 \
                || { echo "request_stop NOT PRESENT — abort"; exit 1; }

              pip install --no-cache-dir -e . --no-deps 2>/dev/null || true

              # Disk preflight
              echo ""
              echo "Disk before run:"
              df -h /tessera_cache | tail -1
              du -sh /tessera_cache 2>/dev/null | tail -1

              mkdir -p /tessera_cache/embeddings /tessera_cache/registry

              # 4 workers + LRU guard 20 GB. The 256 dataset spatial extent
              # overlaps the 512 dataset (same Sweden tiles, just smaller
              # crop), so most TESSERA blocks should already be cached on
              # cephfs from the 2026-05-01 fttgq run if they weren't
              # evicted — many tile reads will be cache hits.
              python scripts/enrich_tiles_tessera.py \
                --data-dir /data/unified_v2 \
                --embeddings-dir /tessera_cache/embeddings \
                --registry-cache-dir /tessera_cache/registry \
                --workers 4 \
                --cache-soft-gb 20 \
                --skip-existing

              echo ""
              echo "Disk after run:"
              df -h /tessera_cache | tail -1
              du -sh /tessera_cache 2>/dev/null | tail -1

          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "8"
              memory: "16Gi"
            limits:
              cpu: "8"
              memory: "16Gi"
          volumeMounts:
            - name: training-data
              mountPath: /data
            # cephfs has 235G free (post-expansion), comfortable headroom
            # for a 20 GB tessera cache + the 256 enrichment writes
            # (which actually go to /data, not /tessera_cache).
            - name: tessera-cache
              mountPath: /tessera_cache
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data
        - name: tessera-cache
          persistentVolumeClaim:
            claimName: training-data-cephfs
