apiVersion: batch/v1
kind: Job
metadata:
  name: orphan-recovery-cdse
  namespace: prithvi-training-default
  labels:
    app: ensemble-prep
    purpose: orphan-recovery-cdse
spec:
  # CDSE leg of the claim-coordinated recovery pair — see
  # orphan-recovery-des-job.yaml for the recovery context. Same list, same
  # staging dir, same claim dir: this leg takes whatever tiles it claims
  # first (single-flight → observed ~4 tiles/h, so DES carries the bulk)
  # PLUS every tile DES fails and releases (the 11 DES-mirror-gap tiles).
  #
  # PU (parallel-boost exception, CLAUDE.md): expected share ~4/h × wall
  # ≈ 150-250 tiles × 4-5 slots — measurable; a 402/403 marks cdse-openeo
  # dead and this leg stops while DES keeps going. DES creds required
  # even here: the era5_then_scl date selector's SCL screen runs on DES.
  backoffLimit: 1
  activeDeadlineSeconds: 259200   # 3 d — matches the DES leg
  ttlSecondsAfterFinished: 172800
  template:
    metadata:
      labels:
        app: ensemble-prep
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: ["p02r09srv04", "p02r09srv06"]
      containers:
        - name: orphan-fetch
          image: python:3.11-slim
          command:
            - bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              echo "=== orphan RECOVERY (CDSE leg, claim-coordinated) ==="
              echo "Started: $(date)"
              apt-get update -qq && apt-get install -y -qq \
                git python3 python3-pip libgdal-dev gdal-bin > /dev/null 2>&1
              pip3 install --quiet --no-cache-dir \
                numpy scipy rasterio pyproj requests Pillow \
                pystac-client openeo shapely 2>&1 | tail -2

              mkdir -p /workspace && cd /workspace
              git clone --depth 1 --branch main \
                https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine
              export PYTHONPATH=/workspace/imintengine:${PYTHONPATH:-}
              echo "CLONED main HEAD: $(git rev-parse --short HEAD)  $(git log --oneline -1)"
              git grep -q 'claim-dir' scripts/fetch_unified_tiles.py \
                && git grep -q 'scl-backend' scripts/fetch_unified_tiles.py \
                && git grep -q '_bands_groups_for_source("cdse-openeo")' \
                     imint/training/openeo_tile_graph.py \
                && echo "OK: claim + parity fixes present" \
                || { echo "FATAL: required fixes NOT in clone — abort"; exit 1; }
              cp /etc/skg/skg_endpoints /workspace/imintengine/.skg_endpoints

              OUT=/data/unified_v2_512_orphans_staging
              echo ""
              echo "Staged already: $(ls $OUT/*.npz 2>/dev/null | wc -l) (resume-skipped)"
              python3 scripts/fetch_unified_tiles.py \
                --mode refetch \
                --from-json /data/audits/orphan_fetch_512.json \
                --output-dir "$OUT" \
                --tile-size-px 512 \
                --years 2018 2019 2021 2022 2023 \
                --workers 1 \
                --fetch-sources cdse-openeo \
                --no-pre2018 \
                --claim-dir "$OUT/.claims" \
                --scl-backend cdse

              echo ""
              echo "Staging total after CDSE leg: $(ls $OUT/*.npz 2>/dev/null | wc -l)"
              echo "=== CDSE recovery leg complete: $(date) ==="
              echo 'CAMPAIGN_GATE_VERDICT={"gate":"orphan-recovery-cdse","ok":true,"reason":"CDSE leg complete"}'
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: FETCH_BACKEND_LABEL
              value: "cdse-openeo"
            - name: VPP_SOURCE
              value: "wekeo"
            - name: VPP_WEKEO_DIR
              value: "/data/vpp_wekeo"
            - name: CDSE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: cdse-credentials
                  key: client_id
            - name: CDSE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cdse-credentials
                  key: client_secret
            # DES creds REQUIRED even on the cdse-spectral leg — the
            # era5_then_scl SCL screen runs on DES openEO (free).
            - name: DES_USER
              valueFrom:
                secretKeyRef:
                  name: des-credentials
                  key: user
            - name: DES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: des-credentials
                  key: password
          envFrom:
            - secretRef:
                name: wekeo-creds
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
            limits:
              cpu: "4"
              memory: "16Gi"
          volumeMounts:
            - name: training-data
              mountPath: /data
            - name: skg-endpoints
              mountPath: /etc/skg
              readOnly: true
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data-cephfs
        - name: skg-endpoints
          secret:
            secretName: skg-endpoints
