apiVersion: batch/v1
kind: Job
metadata:
  name: batch-fetch-openeo
  namespace: prithvi-training-default
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 172800  # 48h
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: fetcher
          image: python:3.11-slim
          command:
            - /bin/bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              echo "=== Batch fetch via CDSE openEO ==="

              apt-get update -qq && apt-get install -y -qq git libgdal-dev gdal-bin > /dev/null 2>&1

              pip install --quiet --no-cache-dir numpy scipy rasterio geopandas shapely requests pyproj openeo pyyaml Pillow httpx

              mkdir -p /workspace && cd /workspace
              git clone --depth 1 https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine
              pip install --no-cache-dir -e . --no-deps 2>/dev/null || true

              python scripts/batch_fetch_openeo.py \
                --tile-locations /data/tile_locations_full.json \
                --vpp-cache /data/unified_v2_512/.vpp_cache.json \
                --output-dir /data/unified_v2_512 \
                --tile-size-px 512 \
                --parallel-jobs 2 \
                --temporal-resolution 14 \
                --min-group-size 10 \
                --year 2022

          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: CDSE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: cdse-credentials
                  key: client_id
                  optional: true
            - name: CDSE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cdse-credentials
                  key: client_secret
                  optional: true
          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
            - name: training-data
              mountPath: /data
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data-cephfs
