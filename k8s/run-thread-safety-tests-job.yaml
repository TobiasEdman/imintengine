apiVersion: batch/v1
kind: Job
metadata:
  name: run-thread-safety-tests
  namespace: prithvi-training-default
  labels:
    app: ensemble-prep
    purpose: regression-test
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: t
          image: python:3.11-slim
          command:
            - bash
            - -c
            - |
              set -e
              apt-get update -qq && apt-get install -y -qq git libexpat1 libgdal-dev > /dev/null 2>&1
              pip install -q --no-cache-dir \
                numpy pandas pyarrow geopandas shapely rasterio pytest

              cd /tmp
              git clone --depth 1 https://github.com/TobiasEdman/ImintEngine.git imintengine 2>&1 | tail -1
              cd /tmp/imintengine
              python -m pytest tests/test_thread_safety.py -v
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
