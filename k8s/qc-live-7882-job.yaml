apiVersion: batch/v1
kind: Job
metadata:
  name: qc-live-7882
  namespace: prithvi-training-default
  labels:
    app: ensemble-prep
    purpose: qc-live-7882
spec:
  backoffLimit: 0
  # Fresh QC baseline for the merged live set (6834 + 1048 orphans =
  # 7882, merge-orphans 2026-07-20). REPORT-ONLY (--no-remove — removal
  # decisions never belong to a QC job; the 2026-07-05 destructive
  # default deleted 901 staging tiles). Writes class_stats.json into the
  # live dir for the re-train baseline.
  activeDeadlineSeconds: 7200
  ttlSecondsAfterFinished: 172800
  template:
    metadata:
      labels:
        app: ensemble-prep
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  # p02r09srv04 + srv06 fail pod-sandbox creation (runc bug)
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: ["p02r09srv04", "p02r09srv06"]
      containers:
        - name: qc
          image: python:3.11-slim
          command:
            - bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              echo "=== live-QC: merged 7882 set (report-only) ==="
              echo "Started: $(date)"
              apt-get update -qq && apt-get install -y -qq git > /dev/null 2>&1
              pip install -q --no-cache-dir numpy
              mkdir -p /workspace && cd /workspace
              git clone --depth 1 --branch main \
                https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine
              echo "CLONED main HEAD: $(git rev-parse --short HEAD)"

              echo "Tiles before: $(ls /data/unified_v2_512/*.npz | wc -l)"
              python3 scripts/postprocess_qc.py \
                --data-dir /data/unified_v2_512 \
                --no-remove
              echo "Tiles after: $(ls /data/unified_v2_512/*.npz | wc -l)"

              echo "=== QC complete: $(date) ==="
              echo 'CAMPAIGN_GATE_VERDICT={"gate":"qc-live-7882","ok":true,"reason":"report-only QC + class_stats written"}'
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "8"
              memory: "32Gi"
            limits:
              cpu: "8"
              memory: "32Gi"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: training-data-cephfs
