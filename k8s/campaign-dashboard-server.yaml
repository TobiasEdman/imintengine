# Re-coreg campaign progress dashboard.
#
# Serves scripts/campaign_dashboard.py output: live Phase-1 progress derived
# purely by counting *.npz in /data/unified_v2_512_recoreg (RBAC-free). The
# script regenerates index.html + campaign_status.json every 60 s; a stdlib
# http.server serves /www.
#
# training-data-cephfs is RWX (CephFS), so this mounts read-only on ANY node
# alongside the Phase-1 writer — no node pin / Multi-Attach concern.
#
# Access:
#   kubectl -n prithvi-training-default port-forward svc/campaign-dashboard 8080:8080
#   → http://localhost:8080/
#   or the auto-assigned NodePort: kubectl get svc campaign-dashboard
#   or https://campaign-dashboard.icedc.se (ingress, cert auto-issued)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: campaign-dashboard
  namespace: prithvi-training-default
  labels:
    app: campaign-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: campaign-dashboard
  template:
    metadata:
      labels:
        app: campaign-dashboard
    spec:
      containers:
        - name: server
          image: python:3.11-slim
          command:
            - bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              echo "=== campaign dashboard server ==="
              apt-get update -qq && apt-get install -y -qq git > /dev/null 2>&1
              # numpy + Pillow power the latest-tile RGB frame previews (via
              # scripts/tile_rgb.py); the progress view is stdlib-only and degrades
              # gracefully (no frames) if these are absent.
              pip3 install --quiet --no-cache-dir numpy Pillow 2>&1 | tail -1
              # Sparse clone — only scripts/ (campaign_dashboard.py + tile_rgb.py +
              # unified_palette.json, the 23-class label palette exported from the
              # schema so there's no imint/ dependency). Checking out all 1113 repo
              # files took >45s → liveness killed the pod mid-clone → crash loop.
              # Sparse = fast startup + fast restarts.
              git clone --depth 1 --filter=blob:none --sparse --branch main \
                https://github.com/TobiasEdman/ImintEngine.git /workspace/imintengine
              cd /workspace/imintengine
              git sparse-checkout set scripts
              echo "CLONED main HEAD: $(git rev-parse --short HEAD)"

              mkdir -p /www
              # Re-pointed 2026-06-29 to the orphan-256→512 campaign after the
              # recoreg promote consumed /data/unified_v2_512_recoreg. Target is
              # now /data/unified_v2_512_orphans_staging (the fetch destination
              # of k8s/campaign-orphan-512-job.yaml). --total = 1147 (size of
              # /data/audits/orphan_fetch_512.json, rebuilt this session) so the
              # main progress bar fills 0→100% as orphans land. --orphan-json
              # turns on the composition header (by-year + by-cohort) so the
              # page tells the viewer "this is what we're tracking now". The
              # Phase-2 section in render_html auto-hides until orphan-Phase-2
              # backfills frame_2016 (step 2d), so during fetch we see just the
              # orphan composition + main progress bar + latest-tile panels.
              # --refetch-since dropped: no in-flight rewrite during the orphan
              # fetch (orphans are pure additions, never overwrite existing).
              # --vpp-report added 2026-07-04 (fetch terminal 2026-07-03): renders
              # the VPP remediation section — WEkEO gap-fill pair bar (of the 57
              # (MGRS, year) pairs the derive Job listed) + backfill tile bar
              # (tiles with non-empty vpp_*, rises as orphan-vpp-backfill rewrites)
              # + GAP-FILL DONE badge once the postfill re-derive lands on 0.
              python3 scripts/campaign_dashboard.py \
                --recoreg-dir /data/unified_v2_512_orphans_staging \
                --orig-dir /data/unified_v2_512 \
                --total 1147 \
                --title "Orphan-256 → 512 campaign · staging" \
                --orphan-json /data/audits/orphan_fetch_512.json \
                --vpp-report /data/audits/orphan_512_missing_vpp_mgrs.json \
                --vpp-cog-dir /data/vpp_wekeo \
                --out-dir /www --watch 60 &

              cd /www
              echo "Serving /www on :8080"
              exec python3 -m http.server 8080
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
          volumeMounts:
            # read-only: the dashboard only counts *.npz + reads mtimes.
            - name: training-data
              mountPath: /data
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 25
            periodSeconds: 10
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data-cephfs
---
apiVersion: v1
kind: Service
metadata:
  name: campaign-dashboard
  namespace: prithvi-training-default
  labels:
    app: campaign-dashboard
spec:
  type: NodePort
  selector:
    app: campaign-dashboard
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: campaign-dashboard-ingress
  namespace: prithvi-training-default
  labels:
    app: campaign-dashboard
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: campaign-dashboard.icedc.se
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: campaign-dashboard
                port:
                  number: 8080
  tls:
    - hosts:
        - campaign-dashboard.icedc.se
      secretName: campaign-dashboard-icedc-tls
