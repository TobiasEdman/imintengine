# Re-coreg campaign progress dashboard.
#
# Serves scripts/campaign_dashboard.py output: live Phase-1 progress derived
# purely by counting *.npz in /data/unified_v2_512_recoreg (RBAC-free). The
# script regenerates index.html + campaign_status.json every 60 s; a stdlib
# http.server serves /www.
#
# training-data-cephfs is RWX (CephFS), so this mounts read-only on ANY node
# alongside the Phase-1 writer — no node pin / Multi-Attach concern.
#
# Access:
#   kubectl -n prithvi-training-default port-forward svc/campaign-dashboard 8080:8080
#   → http://localhost:8080/
#   or the auto-assigned NodePort: kubectl get svc campaign-dashboard
#   or https://campaign-dashboard.icedc.se (ingress, cert auto-issued)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: campaign-dashboard
  namespace: prithvi-training-default
  labels:
    app: campaign-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: campaign-dashboard
  template:
    metadata:
      labels:
        app: campaign-dashboard
    spec:
      containers:
        - name: server
          image: python:3.11-slim
          command:
            - bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              echo "=== campaign dashboard server ==="
              apt-get update -qq && apt-get install -y -qq git > /dev/null 2>&1
              # numpy + Pillow power the latest-tile RGB frame previews (via
              # scripts/tile_rgb.py); the progress view is stdlib-only and degrades
              # gracefully (no frames) if these are absent.
              pip3 install --quiet --no-cache-dir numpy Pillow 2>&1 | tail -1
              # Sparse clone — only scripts/ (campaign_dashboard.py + tile_rgb.py +
              # unified_palette.json, the 23-class label palette exported from the
              # schema so there's no imint/ dependency). Checking out all 1113 repo
              # files took >45s → liveness killed the pod mid-clone → crash loop.
              # Sparse = fast startup + fast restarts.
              git clone --depth 1 --filter=blob:none --sparse --branch main \
                https://github.com/TobiasEdman/ImintEngine.git /workspace/imintengine
              cd /workspace/imintengine
              git sparse-checkout set scripts
              echo "CLONED main HEAD: $(git rev-parse --short HEAD)"

              mkdir -p /www
              # Regenerate the page every 60 s from the live _recoreg dir.
              # --refetch-since = the instant the CURRENT --force re-fetch began
              # writing (job .status.startTime). Repointed from free-aux
              # (2026-06-25T09:47:22Z, now complete) to the VPP --force re-fetch
              # (refetch-recoreg-vpp, started 2026-06-26T06:03:38Z) so the
              # "rewritten since" bar tracks VPP progress. NOTE: the bar's label
              # is hardcoded "aux refetch" in render_html — repointing the epoch
              # does not relabel it (no code change in the "progress bar only"
              # scope). build_aux_alignment (corr(volume,height) φ card) renders
              # unconditionally from the new code this fresh clone picks up.
              python3 scripts/campaign_dashboard.py \
                --recoreg-dir /data/unified_v2_512_recoreg \
                --orig-dir /data/unified_v2_512 \
                --total 6921 \
                --title "Re-coreg campaign · Phase 1" \
                --refetch-since 2026-06-26T06:03:38Z \
                --out-dir /www --watch 60 &

              cd /www
              echo "Serving /www on :8080"
              exec python3 -m http.server 8080
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
          volumeMounts:
            # read-only: the dashboard only counts *.npz + reads mtimes.
            - name: training-data
              mountPath: /data
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 25
            periodSeconds: 10
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data-cephfs
---
apiVersion: v1
kind: Service
metadata:
  name: campaign-dashboard
  namespace: prithvi-training-default
  labels:
    app: campaign-dashboard
spec:
  type: NodePort
  selector:
    app: campaign-dashboard
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: campaign-dashboard-ingress
  namespace: prithvi-training-default
  labels:
    app: campaign-dashboard
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: campaign-dashboard.icedc.se
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: campaign-dashboard
                port:
                  number: 8080
  tls:
    - hosts:
        - campaign-dashboard.icedc.se
      secretName: campaign-dashboard-icedc-tls
