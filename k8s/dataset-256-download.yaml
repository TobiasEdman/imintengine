# Temporary download server for the 256-px unified dataset
# (/data/unified_v2 — 8290 tiles, ~168 GB), basic-auth gated.
#
# SERVES IN PLACE: read-only mount of the `training-data` PVC. No copy /
# no tar — there is no free space to stage a 168 GB archive (rbd ~51 G
# free, cephfs ~60 G free), so the live files are served directly.
#
# CLEAN LISTING: an initContainer builds a symlink farm at
# /web/unified_v2 containing ONLY the .npz tiles + useful bookkeeping
# files (class_stats.json, manifest.json, split lists). This hides the
# stray empty crop/ urban/ cache/ lulc/ .viz dirs that live in the PVC
# root. Symlinks resolve to the read-only PVC; nginx follows them to
# stream the files (range/resume supported).
#
# RWO co-mount: `training-data` is ReadWriteOnce (rook-ceph-rbd), attached
# on node p02r08srv01 by the training-dashboard pod. RWO = one NODE;
# multiple pods on the SAME node can mount it, so this pod is hard-pinned
# to p02r08srv01.
#
# AUTH: HTTP basic-auth via secret `dataset-dl-auth` (created imperatively,
# NOT committed). TLS auto-issued by cert-manager (letsencrypt-prod).
#
# ACCESS (credentials required):
#   https://dataset-256.icedc.se/              -> redirects to the listing
#   https://dataset-256.icedc.se/unified_v2/   -> clean tile listing
#   https://dataset-256.icedc.se/metadata.json -> machine-readable schema
#
# SECRET (run before apply; pick user/password):
#   htpasswd -nbB <user> '<password>' > /tmp/htpasswd
#   kubectl create secret generic dataset-dl-auth -n prithvi-training-default \
#     --from-file=auth=/tmp/htpasswd && rm /tmp/htpasswd
#
# Showcase images are rendered to cephfs by k8s/dataset-256-viz-job.yaml and
# copied into the listing's img/ at pod start.
#
# APPLY (metadata + readme + html ConfigMaps loaded from repo files):
#   kubectl create configmap dataset-256-meta -n prithvi-training-default \
#     --from-file=metadata.json=docs/data/unified_v2_256_metadata.json
#   kubectl create configmap dataset-256-readme -n prithvi-training-default \
#     --from-file=README.md=docs/data/unified_v2_256_README.md
#   kubectl create configmap dataset-256-html -n prithvi-training-default \
#     --from-file=unified_v2_256.html=docs/data/unified_v2_256.html
#   kubectl apply -f k8s/dataset-256-download.yaml
#
# TEARDOWN (~2-day temporary surface):
#   kubectl delete -f k8s/dataset-256-download.yaml
#   kubectl delete configmap dataset-256-meta dataset-256-readme dataset-256-html \
#     dataset-256-viz-script -n prithvi-training-default
#   kubectl delete job dataset-256-viz -n prithvi-training-default --ignore-not-found
#   kubectl delete secret dataset-dl-auth -n prithvi-training-default
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dataset-256-nginx-conf
  namespace: prithvi-training-default
  labels:
    app: dataset-256-dl
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;
      sendfile on;
      tcp_nopush on;
      default_type application/octet-stream;
      types {
        application/octet-stream npz;
        text/plain md;
        application/json json;
        text/html html htm;
        image/png png;
      }
      # Keep redirects relative so they inherit the ingress scheme/host
      # (https://dataset-256.icedc.se) instead of the internal :8080.
      absolute_redirect off;

      # Bare link -> the tile listing.
      location = / { return 302 /unified_v2/; }

      # Machine-readable dataset description.
      location = /metadata.json {
        alias /meta/metadata.json;
        default_type application/json;
        add_header Access-Control-Allow-Origin "*";
      }

      # Clean listing from the symlink farm (/web/unified_v2). Symlinks
      # resolve to the read-only PVC mounted at /data; nginx follows them.
      location /unified_v2/ {
        root /web;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataset-256-dl
  namespace: prithvi-training-default
  labels:
    app: dataset-256-dl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dataset-256-dl
  template:
    metadata:
      labels:
        app: dataset-256-dl
    spec:
      # Hard-pin to the node where the RWO training-data PVC is attached.
      nodeSelector:
        kubernetes.io/hostname: p02r08srv01
      initContainers:
        # Build a symlink farm of just the tiles + useful files, so the
        # autoindex doesn't expose the stray empty crop/ urban/ cache/
        # lulc/ .viz dirs that sit in the PVC root.
        - name: build-listing
          image: nginx:1.27-alpine
          command:
            - sh
            - -c
            - |
              set -e
              SRC=/data/unified_v2
              DST=/web/unified_v2
              mkdir -p "$DST"
              echo "Linking tiles from $SRC ..."
              ln -s "$SRC"/*.npz "$DST"/
              for f in class_stats.json manifest.json splits_summary.json \
                       train.txt val.txt test.txt; do
                [ -f "$SRC/$f" ] && ln -s "$SRC/$f" "$DST/"
              done
              # Human-readable description + HTML equivalent (from configmaps).
              cp /readme/README.md "$DST/README.md"
              cp /html/unified_v2_256.html "$DST/unified_v2_256.html"
              cp /meta/metadata.json "$DST/metadata.json"
              # Data-source showcase PNGs + gallery (rendered to cephfs by
              # k8s/dataset-256-viz-job.yaml). Non-fatal if absent.
              mkdir -p "$DST/img"
              cp /cephfs/_dataset_256_viz/*.png "$DST/img/" 2>/dev/null \
                && cp /cephfs/_dataset_256_viz/showcase.html "$DST/img/" 2>/dev/null \
                && echo "copied showcase images" || echo "viz images not found (skipped)"
              echo "Linked $(ls "$DST" | wc -l) entries."
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          volumeMounts:
            - name: data256
              mountPath: /data
              readOnly: true
            - name: web
              mountPath: /web
            - name: readme
              mountPath: /readme
              readOnly: true
            - name: html
              mountPath: /html
              readOnly: true
            - name: meta
              mountPath: /meta
              readOnly: true
            - name: cephfs
              mountPath: /cephfs
              readOnly: true
      containers:
        - name: nginx
          # Version-pinned (never :latest), matching the repo convention
          # for ephemeral utility pods (cf. python:3.11-slim in the
          # dashboard). Digest-pin if this outlives the 2-day window.
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
              name: http
          # ICE admission webhook (iceguard) requires requests == limits.
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: data256
              mountPath: /data
              readOnly: true
            - name: web
              mountPath: /web
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: meta
              mountPath: /meta
              readOnly: true
          livenessProbe:
            httpGet:
              path: /unified_v2/
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /unified_v2/
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data256
          persistentVolumeClaim:
            claimName: training-data
        - name: web
          emptyDir: {}
        - name: nginx-conf
          configMap:
            name: dataset-256-nginx-conf
        - name: meta
          configMap:
            name: dataset-256-meta
        - name: readme
          configMap:
            name: dataset-256-readme
        - name: html
          configMap:
            name: dataset-256-html
        - name: cephfs
          persistentVolumeClaim:
            claimName: training-data-cephfs
---
apiVersion: v1
kind: Service
metadata:
  name: dataset-256-dl
  namespace: prithvi-training-default
  labels:
    app: dataset-256-dl
spec:
  type: ClusterIP
  selector:
    app: dataset-256-dl
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dataset-256-dl-ingress
  namespace: prithvi-training-default
  labels:
    app: dataset-256-dl
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    # Basic-auth gate (secret dataset-dl-auth — created imperatively).
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: dataset-dl-auth
    nginx.ingress.kubernetes.io/auth-realm: "ImintEngine 256 dataset — login required"
    # Large multi-GB downloads: stream (no buffering), long timeouts.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  ingressClassName: nginx
  rules:
    - host: dataset-256.icedc.se
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dataset-256-dl
                port:
                  number: 8080
  tls:
    - hosts:
        - dataset-256.icedc.se
      secretName: dataset-256-icedc-tls
