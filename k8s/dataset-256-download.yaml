# Temporary download server for the 256-px unified dataset
# (/data/unified_v2 — 8290 tiles, ~168 GB) — a plain shareable link.
#
# SERVES IN PLACE: read-only mount of the `training-data` PVC, nginx
# autoindex. No copy / no tar — there is no free space to stage a
# 168 GB archive (rbd PVC ~51 G free, cephfs ~60 G free), and serving
# the live files avoids it entirely.
#
# RWO co-mount: `training-data` is ReadWriteOnce (rook-ceph-rbd) and is
# currently attached on node p02r08srv01 by the training-dashboard pod.
# RWO = one NODE; multiple pods on the SAME node can mount it. So this
# pod is hard-pinned to p02r08srv01 (mirrors training-dashboard-server.yaml).
#
# ACCESS (public link, no auth — share freely):
#   https://dataset-256.icedc.se/              -> redirects to the listing
#   https://dataset-256.icedc.se/unified_v2/   -> 8290 .npz tiles
#   https://dataset-256.icedc.se/metadata.json -> machine-readable schema
# TLS auto-issued by cert-manager (letsencrypt-prod) on first apply.
#
# The data is derived from open sources (Sentinel-2 / NMD / LPIS / SKS /
# SLU / Copernicus DEM); the link is unauthenticated by request. Add the
# basic-auth annotations back (see git history) if gating is needed.
#
# APPLY (metadata ConfigMap is loaded from the repo file — single source):
#   kubectl create configmap dataset-256-meta -n prithvi-training-default \
#     --from-file=metadata.json=docs/data/unified_v2_256_metadata.json
#   kubectl apply -f k8s/dataset-256-download.yaml
#
# TEARDOWN (this is a ~2-day temporary surface — delete after):
#   kubectl delete -f k8s/dataset-256-download.yaml
#   kubectl delete configmap dataset-256-meta -n prithvi-training-default
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dataset-256-nginx-conf
  namespace: prithvi-training-default
  labels:
    app: dataset-256-dl
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;
      sendfile on;
      tcp_nopush on;
      default_type application/octet-stream;
      types { application/octet-stream npz; }

      # Bare link -> the tile listing.
      location = / { return 302 /unified_v2/; }

      # Machine-readable dataset description.
      location = /metadata.json {
        alias /meta/metadata.json;
        default_type application/json;
        add_header Access-Control-Allow-Origin "*";
      }

      # The 168 GB of tiles, served in place from the read-only PVC.
      # Directory listing + resumable (range) downloads.
      location /unified_v2/ {
        root /data;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataset-256-dl
  namespace: prithvi-training-default
  labels:
    app: dataset-256-dl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dataset-256-dl
  template:
    metadata:
      labels:
        app: dataset-256-dl
    spec:
      # Hard-pin to the node where the RWO training-data PVC is attached
      # (same constraint as training-dashboard-server.yaml).
      nodeSelector:
        kubernetes.io/hostname: p02r08srv01
      containers:
        - name: nginx
          # Version-pinned (never :latest), matching the repo convention
          # for ephemeral utility pods (cf. python:3.11-slim in the
          # dashboard). Digest-pin if this outlives the 2-day window.
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          volumeMounts:
            - name: data256
              mountPath: /data
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: meta
              mountPath: /meta
              readOnly: true
          livenessProbe:
            httpGet:
              path: /unified_v2/
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /unified_v2/
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data256
          persistentVolumeClaim:
            claimName: training-data
        - name: nginx-conf
          configMap:
            name: dataset-256-nginx-conf
        - name: meta
          configMap:
            name: dataset-256-meta
---
apiVersion: v1
kind: Service
metadata:
  name: dataset-256-dl
  namespace: prithvi-training-default
  labels:
    app: dataset-256-dl
spec:
  type: ClusterIP
  selector:
    app: dataset-256-dl
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dataset-256-dl-ingress
  namespace: prithvi-training-default
  labels:
    app: dataset-256-dl
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    # Large multi-GB downloads: stream (no buffering), long timeouts.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  ingressClassName: nginx
  rules:
    - host: dataset-256.icedc.se
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dataset-256-dl
                port:
                  number: 8080
  tls:
    - hosts:
        - dataset-256.icedc.se
      secretName: dataset-256-icedc-tls
