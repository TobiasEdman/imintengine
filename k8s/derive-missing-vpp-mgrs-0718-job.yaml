apiVersion: batch/v1
kind: Job
metadata:
  name: derive-missing-vpp-mgrs-0718
  namespace: prithvi-training-default
  labels:
    app: ensemble-prep
    purpose: derive-missing-vpp-mgrs-0718
spec:
  backoffLimit: 0
  # Orphan-512 VPP remediation — FRESH derive 2026-07-18. The 07-04
  # baseline (orphan_512_missing_vpp_mgrs.json) predates the recovery
  # tiles fetched 07-04→07-10; ~139/1046 staging tiles now lack vpp_*
  # and may hit (MGRS, year) pairs outside the baseline's fill. Output
  # goes to a NEW dated path — the dashboard reads the 07-04 file as
  # its report_path baseline; do NOT overwrite it.
  #
  # READ-ONLY on tiles; writes only the JSON report under /data/audits.
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: ensemble-prep
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  # p02r09srv04 + srv06 fail pod-sandbox creation (runc bug)
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: ["p02r09srv04", "p02r09srv06"]
      containers:
        - name: derive
          image: python:3.11-slim
          command:
            - bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              echo "=== derive missing VPP (MGRS, year) — fresh 2026-07-18 ==="
              echo "Started: $(date)"
              apt-get update -qq && apt-get install -y -qq git > /dev/null 2>&1
              # mgrs needs `packaging` at import time (mgrs/core.py) — pin it in.
              pip3 install --quiet --no-cache-dir \
                numpy pyproj mgrs packaging 2>&1 | tail -2

              mkdir -p /workspace && cd /workspace
              git clone --depth 1 --branch main \
                https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine
              export PYTHONPATH=/workspace/imintengine:${PYTHONPATH:-}
              echo "CLONED main HEAD: $(git rev-parse --short HEAD)"

              python3 scripts/derive_missing_vpp_mgrs.py \
                --data-dir /data/unified_v2_512_orphans_staging \
                --vpp-cog-dir /data/vpp_wekeo \
                --output /data/audits/orphan_512_missing_vpp_mgrs_20260718.json

              echo "=== derive complete: $(date) ==="
              echo 'CAMPAIGN_GATE_VERDICT={"gate":"derive-missing-vpp-mgrs-0718","ok":true,"reason":"report written"}'
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
            limits:
              cpu: "2"
              memory: "8Gi"
          volumeMounts:
            - name: training-data
              mountPath: /data
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data-cephfs
