# Temporary pod for uploading data via kubectl cp
apiVersion: v1
kind: Pod
metadata:
  name: data-upload
  namespace: prithvi-training-default
spec:
  containers:
    - name: uploader
      image: busybox:1.36
      command: ["sleep", "86400"]
      resources:
        requests:
          cpu: "2"
          memory: 4Gi
        limits:
          cpu: "2"
          memory: 4Gi
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: training-data
  restartPolicy: Never
