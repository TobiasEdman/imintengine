apiVersion: batch/v1
kind: Job
metadata:
  name: prithvi-seasonal-train
  namespace: prithvi-training-default
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 50400  # 14h max, auto-kill if stuck
  template:
    metadata:
      labels:
        app: prithvi-training
    spec:
      initContainers:
        # Clone repo and install dependencies
        - name: setup
          image: nvidia/cuda:12.4.1-runtime-ubuntu22.04
          command:
            - /bin/bash
            - -c
            - |
              set -ex
              apt-get update && apt-get install -y --no-install-recommends \
                python3.11 python3.11-venv python3-pip \
                libgdal30 git
              update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1

              # Clone repo
              git clone --depth 1 https://github.com/TobiasEdman/imintengine.git /app

              # Create venv + install deps
              cd /app
              python3 -m venv .venv
              .venv/bin/pip install --no-cache-dir \
                torch --index-url https://download.pytorch.org/whl/cu124
              .venv/bin/pip install --no-cache-dir -r requirements.txt

              echo "Setup complete!"
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
            limits:
              cpu: "4"
              memory: 16Gi
          volumeMounts:
            - name: app
              mountPath: /app
      containers:
        - name: trainer
          image: nvidia/cuda:12.4.1-runtime-ubuntu22.04
          command:
            - /bin/bash
            - -c
            - |
              set -ex
              apt-get update && apt-get install -y --no-install-recommends \
                python3.11 libgdal30
              update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1

              cd /app

              # End-to-end training: backbone (partial unfreeze) + decoder + aux
              # 12 classes: 10-class + buildings + temp_non_forest
              # 4 growing-season frames, VPP-guided per-tile windows
              # Gap-filled with 2020/2021 data for missing frames
              .venv/bin/python scripts/train_lulc.py \
                --data-dir /data/lulc_seasonal_vpp \
                --device cuda \
                --num-classes 12 \
                --num-frames 4 \
                --enable-multitemporal \
                --enable-height --enable-volume \
                --enable-basal-area --enable-diameter \
                --enable-dem \
                --batch-size 16 \
                --num-workers 8 \
                --epochs 50 \
                --save-every 5 \
                --checkpoint-dir /checkpoints \
                --dashboard
          resources:
            requests:
              cpu: "8"
              memory: 64Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: 64Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: app
              mountPath: /app
            - name: data
              mountPath: /data
            - name: checkpoints
              mountPath: /checkpoints
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: app
          emptyDir: {}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
        - name: data
          persistentVolumeClaim:
            claimName: training-data
        - name: checkpoints
          persistentVolumeClaim:
            claimName: training-checkpoints
      restartPolicy: Never
      # Target H100 nodes (override project default 2080ti)
      nodeSelector:
        accelerator: nvidia-h100
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
