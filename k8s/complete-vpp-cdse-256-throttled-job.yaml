apiVersion: batch/v1
kind: Job
metadata:
  name: complete-vpp-cdse-256-throttled
  namespace: prithvi-training-default
  labels:
    app: ensemble-prep
    purpose: vpp-256-cdse-throttled
spec:
  backoffLimit: 0
  # /data/unified_v2 has 4797 tiles missing VPP (audit 2026-05-08).
  # VPP is a 5-band Sentinel Hub call, ~3 PU/fetch → ~14k PU total.
  # Capped at 100/h → ~48 h walltime. Runs in parallel with the
  # frame_2016 job (different output keys, atomic writes, no race).
  # 5 day cap.
  activeDeadlineSeconds: 432000
  template:
    metadata:
      labels:
        app: ensemble-prep
    spec:
      restartPolicy: Never
      # Avoid p02r09srv04 — broken cgroup/runc as of 2026-05-12.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: ["p02r09srv04"]
      containers:
        - name: v
          image: python:3.11-slim
          command:
            - bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              echo "=== VPP CDSE-completion 256 (throttled 100/h) ==="
              echo "Started: $(date)"

              apt-get update -qq && apt-get install -y -qq \
                git libgdal-dev gdal-bin > /dev/null 2>&1
              pip install --quiet --no-cache-dir \
                numpy scipy rasterio pyproj requests Pillow

              mkdir -p /workspace && cd /workspace
              git clone --depth 1 \
                https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine

              echo ""
              echo "Verifying --max-per-hour is in cloned prefetch_aux:"
              grep -n "_wait_for_rate_limit\|--max-per-hour" \
                scripts/prefetch_aux.py | head -3 \
                || { echo "rate limiter NOT PRESENT — abort"; exit 1; }

              pip install --no-cache-dir -e . --no-deps 2>/dev/null || true
              export PYTHONPATH=/workspace/imintengine:${PYTHONPATH:-}

              echo ""
              echo "Tile inventory:"
              echo "  /data/unified_v2: $(ls /data/unified_v2/*.npz 2>/dev/null | wc -l) tiles"

              # --channels vpp: only fetch VPP (skip SKG/DEM/markfukt
              # which are already 99.9% covered).
              # --max-per-hour 100: global sliding-window cap. Workers
              # absorb network latency; cap is the real throttle.
              python scripts/prefetch_aux.py \
                --data-dir /data/unified_v2 \
                --channels vpp \
                --workers 4 \
                --max-per-hour 100

              echo ""
              echo "=== Done: $(date) ==="

          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: CDSE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: cdse-credentials
                  key: client_id
            - name: CDSE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cdse-credentials
                  key: client_secret
          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
            - name: training-data
              mountPath: /data
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data
