apiVersion: batch/v1
kind: Job
metadata:
  name: enrich-256-rededge-s1-tessera
  namespace: prithvi-training-default
  labels:
    app: ensemble-prep
    purpose: enrich-256-with-modern-aux
spec:
  backoffLimit: 1
  # 8290 tiles × 3 enrichment passes (rededge, S1, tessera).
  # rededge: ~2 h on free CDSE PU.
  # S1:      ~3 h via STAC + COG (cdse_s1_stac, no PU).
  # tessera: ~30 min from local /data/tessera_cache.
  # Total ETA: ~6 h. 12h cap.
  activeDeadlineSeconds: 43200
  template:
    metadata:
      labels:
        app: ensemble-prep
    spec:
      restartPolicy: Never
      containers:
        - name: e
          image: python:3.11-slim
          command:
            - bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              echo "=== enrich 256 with rededge + S1 + tessera ==="
              echo "Started: $(date)"

              apt-get update -qq && apt-get install -y -qq \
                git libexpat1 libgdal-dev gdal-bin > /dev/null 2>&1
              pip install --quiet --no-cache-dir \
                numpy scipy rasterio requests pyproj pyarrow Pillow \
                pystac-client geopandas shapely \
                openeo planetary-computer

              mkdir -p /workspace && cd /workspace
              git clone --depth 1 \
                https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine
              pip install --no-cache-dir -e . --no-deps 2>/dev/null || true
              export PYTHONPATH=/workspace/imintengine:${PYTHONPATH:-}

              echo ""
              echo "Tile inventory:"
              echo "  /data/unified_v2: $(ls /data/unified_v2/*.npz 2>/dev/null | wc -l) tiles"

              # ── Step 1: rededge (B05/B06/B07) via DES openEO (no PU) ─────
              # Workers=4: DES openEO has no PU quota but the backend
              # rate-limits aggressive callers; q57ts confirmed 4 workers
              # sustains ~200 tiles/h without throttling.
              echo ""
              echo "=== Step 1: rededge enrichment (DES openEO, no PU) ==="
              python scripts/enrich_tiles_rededge.py \
                --data-dir /data/unified_v2 \
                --source des \
                --workers 4 \
                --skip-existing

              # ── Step 2: S1 SAR via cascade fallback (CDSE → MPC → AWS) ───
              echo ""
              echo "=== Step 2: S1 SAR enrichment (cascade backend) ==="
              python scripts/enrich_tiles_s1.py \
                --data-dir /data/unified_v2 \
                --s1-backend cascade \
                --workers 4 \
                --skip-existing

              # ── Step 3: TESSERA embeddings (LRU-bounded cache) ───────────
              # The TESSERA cache lives on /tessera_cache → cephfs PVC, not
              # /data → training-data PVC. The 256-tile dataset (unified_v2)
              # is 26 GB on a 98 GiB rbd PVC — putting the 20 GB LRU cache
              # there would risk re-running the disk-full incident.
              # cephfs has 132+ GB free post-cleanup.
              # --cache-soft-gb 20 + LRU guard (commit 4b75bd7) keeps usage
              # bounded; the previous unbounded cache hit 146 GB and broke.
              echo ""
              echo "=== Step 3: TESSERA embeddings (LRU-bounded) ==="
              python scripts/enrich_tiles_tessera.py \
                --data-dir /data/unified_v2 \
                --embeddings-dir /tessera_cache/embeddings \
                --registry-cache-dir /tessera_cache/registry \
                --workers 4 \
                --cache-soft-gb 20 \
                --skip-existing

              echo ""
              echo "=== Done: $(date) ==="
              python3 -c "
              import numpy as np, glob
              files = sorted(glob.glob('/data/unified_v2/*.npz'))[:5]
              for f in files:
                  d = np.load(f, allow_pickle=True)
                  found = [k for k in ['rededge','s1_vv_vh','tessera'] if k in d]
                  print(f'  {f.split(\"/\")[-1]}: {found}')
              "

          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: CDSE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: cdse-credentials
                  key: client_id
            - name: CDSE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cdse-credentials
                  key: client_secret
            # DES openEO Basic-Auth — used by Step 1 rededge --source des.
            # Without these env vars, imint.fetch._connect() raises
            # "DES credentials not configured" and rededge fetches return
            # None for every frame.
            - name: DES_USER
              valueFrom:
                secretKeyRef:
                  name: des-credentials
                  key: user
            - name: DES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: des-credentials
                  key: password
          resources:
            requests:
              cpu: "8"
              memory: "16Gi"
            limits:
              cpu: "8"
              memory: "16Gi"
          volumeMounts:
            - name: training-data
              mountPath: /data
            # cephfs PVC for the TESSERA embeddings cache only — kept off
            # /data so it can't fill the 98 GiB rbd PVC that holds
            # /data/unified_v2 (26 GB) + ~25 GB of new rededge bands.
            - name: tessera-cache
              mountPath: /tessera_cache
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data
        - name: tessera-cache
          persistentVolumeClaim:
            claimName: training-data-cephfs
