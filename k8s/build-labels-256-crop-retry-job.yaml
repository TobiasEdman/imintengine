apiVersion: batch/v1
kind: Job
metadata:
  name: build-labels-256-crop-retry
  namespace: prithvi-training-default
  labels:
    app: ensemble-prep
    purpose: build-labels-256-crop-retry
spec:
  backoffLimit: 0
  # 1000 crop_* tiles failed Phase 3 in fas1-fillgaps-256-xhsq6 with
  # "got no LPIS overlay" because the pod cloned before the modal-year
  # fix (fc042ad) landed. Re-run only those tiles with the fixed code.
  # Plus 9 numeric/LPIS_* tiles that genuinely have no_bbox — those will
  # fail again with the same reason; left in scope to confirm.
  # ETA ~15 min for ~1000 tiles. 1h cap.
  activeDeadlineSeconds: 3600
  template:
    metadata:
      labels:
        app: ensemble-prep
    spec:
      restartPolicy: Never
      containers:
        - name: b
          image: python:3.11-slim
          command:
            - bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              echo "=== build-labels-256-crop-retry ==="
              echo "Started: $(date)"

              apt-get update -qq && apt-get install -y -qq \
                git libexpat1 libgdal-dev gdal-bin > /dev/null 2>&1
              pip install --quiet --no-cache-dir \
                numpy scipy rasterio requests pyproj pyarrow \
                geopandas shapely

              mkdir -p /workspace && cd /workspace
              git clone --depth 1 \
                https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine

              # Verify the modal-year fix is in cloned source
              echo ""
              echo "Verifying modal-year fix (fc042ad) is in cloned source:"
              grep -n "modal year\|most common year" scripts/build_labels.py | head -3 \
                || { echo "modal-year fix NOT PRESENT — abort"; exit 1; }

              pip install --no-cache-dir -e . --no-deps 2>/dev/null || true
              export PYTHONPATH=/workspace/imintengine:${PYTHONPATH:-}

              # Find tiles missing nmd_label_raw (= the 1009 fails from
              # the previous run, now hopefully retryable with the year fix)
              echo ""
              echo "Identifying tiles still missing nmd_label_raw..."
              python3 - <<'PY' > /tmp/retry_ids.txt
              import glob, numpy as np
              ids = []
              for f in sorted(glob.glob("/data/unified_v2/*.npz")):
                  try:
                      with np.load(f, allow_pickle=True) as d:
                          if "nmd_label_raw" not in d.files:
                              ids.append(f.split("/")[-1].replace(".npz", ""))
                  except Exception:
                      pass
              print("\n".join(ids))
              PY

              N=$(wc -l < /tmp/retry_ids.txt)
              echo "Tiles to retry: $N"

              if [ "$N" -gt 0 ]; then
                  python scripts/build_labels.py \
                    --data-dir /data/unified_v2 \
                    --nmd-raster /data-cephfs/nmd/nmd2018bas_ogeneraliserad_v1_1.tif \
                    --lpis-dir /data-cephfs/lpis \
                    --sks-dir /data-cephfs/sks \
                    --workers 4 \
                    --executor thread \
                    --tile-ids $(cat /tmp/retry_ids.txt | tr '\n' ' ')
              fi

              echo ""
              echo "=== Done: $(date) ==="

          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "8"
              memory: "96Gi"
            limits:
              cpu: "8"
              memory: "96Gi"
          volumeMounts:
            - name: training-data
              mountPath: /data
            - name: training-data-cephfs
              mountPath: /data-cephfs
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data
        - name: training-data-cephfs
          persistentVolumeClaim:
            claimName: training-data-cephfs
