---
# Job: Rebuild all labels (NMD + LPIS + SKS) from scratch for all ~6,600 tiles.
#
# Fixes applied in this run vs previous builds:
#   ✓ NMD seam removed — rasterio out_shape instead of scipy.ndimage.zoom
#   ✓ LPIS gated — only applied where NMD says åker/öppen mark (merge_all)
#   ✓ SKS gated  — only applied where NMD says forest (merge_all)
#   ✓ 23-class unified schema (10-class stubs removed)
#
# What this writes to each tile .npz:
#   label           (H×W int8)   unified 23-class via merge_all()
#   label_mask      (H×W uint16) raw LPIS SJV crop codes
#   parcel_area_ha  (H×W float32) per-pixel parcel area for loss weighting
#   harvest_mask    (H×W uint8)  SKS clearcut, no rotation (fixed geometry)
#   n_parcels       (int32)
#
# Runtime estimate: 6,597 tiles ÷ 32 workers × ~3 s/tile ≈ 10 min
#   + LPIS/SKS load overhead (~5 min) → ~15 min total
# Memory: LPIS 4 years × ~3 Gi + SKS ~3 Gi + worker headroom → 96 Gi safe
#
apiVersion: batch/v1
kind: Job
metadata:
  name: build-labels-512
  namespace: prithvi-training-default
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 14400   # 4 h safety cap (8261 tiles @ ~3000/h ≈ 2.8 h)
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: builder
          image: python:3.11-slim
          command:
            - /bin/bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              echo "=== Build Labels v2 — NMD + LPIS + SKS ==="
              echo "Started: $(date)"

              apt-get update -qq && apt-get install -y -qq git libgdal-dev gdal-bin > /dev/null 2>&1
              pip install -q --no-cache-dir numpy scipy rasterio geopandas shapely pyproj pyarrow pyyaml

              mkdir -p /workspace && cd /workspace
              git clone --depth 1 https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine
              pip install --no-cache-dir -e . --no-deps 2>/dev/null || true

              echo ""
              echo "Data inventory:"
              echo "  Tiles:      $(ls /data/unified_v2_512/*.npz 2>/dev/null | wc -l)"
              echo "  NMD raster: $(ls -lh /data/nmd/*.tif 2>/dev/null | head -1)"
              echo "  LPIS:       $(ls /data/lpis/*.parquet 2>/dev/null | wc -l) parquets"
              echo "  SKS:        $(ls /data/sks/*.parquet 2>/dev/null | wc -l) parquets"
              echo ""

              # SpatialParquet readers only load row groups that overlap
              # each tile bbox, so memory is ~MB/worker instead of ~GB/worker.
              # 32 workers now safely fits in 24 Gi.
              python scripts/build_labels.py \
                --data-dir  /data/unified_v2_512 \
                --nmd-raster /data/nmd/nmd2018bas_ogeneraliserad_v1_1.tif \
                --lpis-dir  /data/lpis \
                --sks-dir   /data/sks \
                --workers 32

              echo ""
              echo "=== QC ==="
              python scripts/postprocess_qc.py --data-dir /data/unified_v2_512 || true

              echo ""
              echo "=== Done: $(date) ==="

          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "32"
              memory: "96Gi"
            limits:
              cpu: "32"
              memory: "96Gi"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: training-data-cephfs
