apiVersion: batch/v1
kind: Job
metadata:
  name: fix-one-tile
  namespace: prithvi-training-default
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 1200
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: fix-one-tile
          image: python:3.11-slim
          command:
            - /bin/bash
            - -c
            - |
              apt-get update -qq && apt-get install -y -qq git > /dev/null 2>&1
              pip install numpy -q
              git clone --depth 1 https://github.com/TobiasEdman/ImintEngine.git /repo
              echo "=== Fixing bad label pixels ==="
              python3 /repo/scripts/fix_bad_label_tile.py /data/unified_v2
              echo "=== Verifying ==="
              python3 /repo/scripts/check_label_values.py /data/unified_v2
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
            limits:
              cpu: "1"
              memory: "4Gi"
          volumeMounts:
            - name: training-data
              mountPath: /data
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data-cephfs
