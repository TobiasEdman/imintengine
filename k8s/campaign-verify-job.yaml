apiVersion: batch/v1
kind: Job
metadata:
  name: campaign-verify
  namespace: prithvi-training-default
  labels:
    app: dataset-completion
    purpose: campaign-verify
spec:
  # PRE-PROMOTE VERIFY of the dataset-completion campaign. Runs IN-CLUSTER (the
  # orchestrator runs where kubectl is and has NO PVC mount, so the sample-verify
  # that reads /data tiles MUST run here). Samples N unified_v2_512_recoreg tiles
  # and asserts the FULL post-campaign layout per tile:
  #   * spectral (24,512,512)            — 4 temporal slots x 6 Prithvi bands
  #   * label present                    — restored by campaign-label-restore
  #   * frame_2016 (6,512,512) present   — filled by campaign-phase2-sen2cor
  #   * VPP non-empty OR in the known-empty set (vpp_known_empty.json)
  #   * coreg_ref_frame present          — Phase-1 M2 anchor provenance
  # It then prints exactly ONE machine-parseable verdict line the orchestrator
  # reads back via `kubectl logs job/campaign-verify`:
  #   CAMPAIGN_GATE_VERDICT={"gate":"verify","ok":<bool>,"reason":...,"metrics":...}
  # ok=true ONLY if every sampled tile passes ALL checks; otherwise ok=false and the
  # orchestrator HALTS before promote. Read-only — no writes to /data.
  #
  # python:3.11-slim — pure numpy tile inspection, no fetch / torch / GPU.
  # REQUIRES: the campaign commits on origin/main (verify the echoed CLONED HEAD).
  backoffLimit: 1
  activeDeadlineSeconds: 3600
  template:
    metadata:
      labels:
        app: dataset-completion
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-push
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: ["p02r09srv04", "p02r09srv06"]
      containers:
        - name: verify
          image: python:3.11-slim
          command:
            - bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              echo "=== campaign verify: sample N _recoreg tiles, assert full layout ==="
              echo "Started: $(date)"
              apt-get update -qq && apt-get install -y -qq git > /dev/null 2>&1
              pip3 install --quiet --no-cache-dir numpy 2>&1 | tail -1

              mkdir -p /workspace && cd /workspace
              git clone --depth 1 --branch main \
                https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine
              export PYTHONPATH=/workspace/imintengine:${PYTHONPATH:-}
              echo "CLONED HEAD: $(git rev-parse --short HEAD)  $(git log --oneline -1)"

              RECOREG=/data/unified_v2_512_recoreg
              # Emit the single verdict line the orchestrator parses. Every sampled
              # tile must pass ALL checks for ok=true.
              python3 - "$RECOREG" <<'PYEOF'
              import glob, json, os, random, sys
              import numpy as np

              recoreg = sys.argv[1]
              N = int(os.environ.get("VERIFY_SAMPLE_N", "40"))
              paths = sorted(glob.glob(os.path.join(recoreg, "*.npz")))

              def verdict(ok, reason, metrics):
                  # MUST be the last line + single-line JSON (orchestrator reads
                  # `kubectl logs --tail -1` and json.loads the suffix).
                  print("CAMPAIGN_GATE_VERDICT=" + json.dumps(
                      {"gate": "verify", "ok": bool(ok),
                       "reason": reason, "metrics": metrics}))

              if not paths:
                  verdict(False, "no _recoreg tiles found", {"n_tiles": 0})
                  sys.exit(0)

              # Known genuinely-empty-VPP tiles are allowed to lack VPP.
              ke_path = os.path.join(recoreg, "vpp_known_empty.json")
              known_empty = set()
              if os.path.exists(ke_path):
                  try:
                      known_empty = set(json.load(open(ke_path)).keys())
                  except Exception:
                      known_empty = set()

              VPP = [f"vpp_{n}" for n in ("sosd", "eosd", "length", "maxv", "minv")]
              rng = random.Random(1234)
              sample = paths if len(paths) <= N else rng.sample(paths, N)
              failures = []
              for p in sample:
                  name = os.path.basename(p)[:-4]
                  try:
                      d = np.load(p, allow_pickle=True)
                  except Exception as e:
                      failures.append(f"{name}: load {type(e).__name__}")
                      continue
                  files = set(d.files)
                  # spectral (24,512,512)
                  if "spectral" not in files or tuple(d["spectral"].shape) != (24, 512, 512):
                      failures.append(f"{name}: spectral shape "
                                      f"{tuple(d['spectral'].shape) if 'spectral' in files else None}")
                  # label present
                  if "label" not in files:
                      failures.append(f"{name}: no label")
                  # frame_2016 present (6,512,512)
                  if int(d.get("has_frame_2016", 0)) != 1 or "frame_2016" not in files \
                          or tuple(d["frame_2016"].shape) != (6, 512, 512):
                      failures.append(f"{name}: frame_2016 missing/shape")
                  # coreg anchor provenance
                  if "coreg_ref_frame" not in files:
                      failures.append(f"{name}: no coreg_ref_frame")
                  # VPP non-empty OR known-empty
                  vpp_ok = all(k in files for k in VPP) and any(
                      bool(np.any(np.asarray(d[k]))) for k in VPP if k in files)
                  if not vpp_ok and name not in known_empty:
                      failures.append(f"{name}: empty VPP, not in known-empty set")

              metrics = {"n_tiles": len(paths), "sampled": len(sample),
                         "failures": len(failures),
                         "examples": failures[:8]}
              if failures:
                  verdict(False, f"{len(failures)}/{len(sample)} sampled tiles "
                                 f"failed layout checks", metrics)
              else:
                  verdict(True, f"all {len(sample)} sampled tiles pass "
                                f"spectral/label/frame_2016/vpp/anchor", metrics)
              PYEOF
              echo "=== verify complete: $(date) ==="
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: VERIFY_SAMPLE_N
              value: "40"
          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
            - name: training-data
              mountPath: /data
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data-cephfs
