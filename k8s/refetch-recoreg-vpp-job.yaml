apiVersion: batch/v1
kind: Job
metadata:
  name: refetch-recoreg-vpp
  namespace: prithvi-training-default
  labels:
    app: ensemble-prep
    purpose: refetch-recoreg-vpp
spec:
  backoffLimit: 0
  # ─────────────────────────────────────────────────────────────────────────
  # APPLY ONLY AFTER (1) refetch-recoreg-aux-free is Complete AND (2) the 8
  # label-less tiles have been dropped. Two reasons, both write-races on
  # /data/unified_v2_512_recoreg:
  #   - free-aux is a concurrent writer of the same .npz (os.replace race).
  #   - the 8-tile drop is a delete; a --force re-fetch mid-drop would re-stamp
  #     a tile we are about to remove (read-modify-write race).
  # Gate on both before `kubectl apply`.
  # ─────────────────────────────────────────────────────────────────────────
  #
  # Corrects the 256/512 aux-misalignment for the 5 VPP phenology channels
  # (vpp_sosd/eosd/length/maxv/minv). These were fetched at the wrong central-
  # quarter 256 bbox; backfill_vpp now derives the bbox from the tile grid via
  # resolve_fetch_bbox, so --force re-fetches them at the correct 512 extent and
  # OVERWRITES the wrong data (atomic per-tile; all other keys, incl. the
  # correct `height`, preserved).
  #
  # WHY A SEPARATE JOB from campaign-vpp-backfill-job.yaml: that job omits
  # --force, so it skips any tile whose VPP is merely *present* — which is every
  # recoreg tile (present, but on the wrong grid). --force is the whole point.
  #
  # PU-FREE: the WEkEO COG cache (/data/vpp_wekeo) is complete for the recoreg
  # set after prefetch-vpp-wekeo-gapfill (2019/2023 top-up), so every tile reads
  # from WEkEO; the metered CDSE fallback is never reached. VPP_SOURCE=wekeo.
  activeDeadlineSeconds: 28800   # 8 h — 6912 tiles x 5 channels at WEkEO-cache read speed
  template:
    metadata:
      labels:
        app: ensemble-prep
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-push
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  # p02r09srv04 + srv06 fail pod-sandbox creation (runc bug)
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: ["p02r09srv04", "p02r09srv06"]
      containers:
        - name: refetch
          # Same imint-sen2cor image (digest-pinned) the WEkEO prefetch +
          # campaign VPP backfill use — carries the hda + rasterio + pyproj deps.
          image: ghcr.io/tobiasedman/imint-sen2cor@sha256:528adef18445404c6f491ff2f8a81f3d75f908280704d69c2c507f820f59de28
          command:
            - bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              echo "=== re-fetch recoreg VPP (--force, WEkEO-primary) ==="
              echo "Started: $(date)"

              apt-get update -qq && apt-get install -y -qq \
                git python3 python3-pip libgdal-dev gdal-bin > /dev/null 2>&1
              pip3 install --quiet --no-cache-dir \
                numpy rasterio pyproj scipy hda 2>&1 | tail -3

              mkdir -p /workspace && cd /workspace
              git clone --depth 1 --branch main \
                https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine
              export PYTHONPATH=/workspace/imintengine:${PYTHONPATH:-}
              # A shallow clone pins to the remote HEAD at submit time — verify
              # the bbox fix + --force are in the cloned tip before writing.
              echo "CLONED main HEAD: $(git rev-parse --short HEAD)"
              git grep -q "resolve_fetch_bbox" scripts/backfill_vpp.py \
                && echo "OK: backfill_vpp uses resolve_fetch_bbox (bbox fix present)" \
                || { echo "FATAL: bbox fix NOT in clone — abort"; exit 1; }
              grep -q -- "--force" scripts/backfill_vpp.py \
                && echo "OK: backfill_vpp exposes --force" \
                || { echo "FATAL: --force NOT in clone — abort"; exit 1; }

              echo ""
              echo "Tiles: $(ls /data/unified_v2_512_recoreg/*.npz 2>/dev/null | wc -l)"
              echo "WEkEO cache COGs: $(ls /data/vpp_wekeo/*.tif 2>/dev/null | wc -l)"
              echo "=== --force overwrite of vpp_{sosd,eosd,length,maxv,minv} ==="
              python3 scripts/backfill_vpp.py \
                --data-dir /data/unified_v2_512_recoreg \
                --force \
                --workers 2

              echo ""
              echo "=== known-empty catalogue (if any) ==="
              cat /data/unified_v2_512_recoreg/vpp_known_empty.json 2>/dev/null \
                | head -40 || echo "(none)"

              echo ""
              echo "=== post-check: VPP present + finite, sample 3 tiles ==="
              python3 - <<'PYEOF'
              import glob, numpy as np
              def corr(a, b):
                  a = a.astype(float); b = b.astype(float)
                  m = np.isfinite(a) & np.isfinite(b) & (a != 0) & (b != 0)
                  if m.sum() < 200: return float("nan")
                  ac = a[m]-a[m].mean(); bc = b[m]-b[m].mean()
                  d = np.sqrt((ac*ac).sum()*(bc*bc).sum())
                  return float((ac*bc).sum()/d) if d else float("nan")
              n = 0
              for p in sorted(glob.glob("/data/unified_v2_512_recoreg/*.npz")):
                  if n >= 3: break
                  z = np.load(p, allow_pickle=True)
                  if "vpp_maxv" not in z.files or "height" not in z.files: continue
                  c = corr(z["vpp_maxv"], z["height"])
                  finite = np.isfinite(z["vpp_maxv"]).mean()
                  print(f"  {p.split('/')[-1]}: corr(vpp_maxv,height)={c:.3f} "
                        f"finite_frac={finite:.2f}  (want >0 once aligned)")
                  n += 1
              print("POST-CHECK DONE")
              PYEOF
              echo "=== done: $(date) ==="
              # Verdict for the campaign orchestrator (reached only on success).
              echo 'CAMPAIGN_GATE_VERDICT={"gate":"vpp-refetch","ok":true,"reason":"VPP --force re-fetch complete"}'
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: VPP_WEKEO_DIR
              value: "/data/vpp_wekeo"
            - name: VPP_SOURCE
              value: "wekeo"
            - name: CDSE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: cdse-credentials
                  key: client_id
                  optional: true
            - name: CDSE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cdse-credentials
                  key: client_secret
                  optional: true
          envFrom:
            - secretRef:
                name: wekeo-creds
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
            limits:
              cpu: "4"
              memory: "16Gi"
          volumeMounts:
            - name: training-data
              mountPath: /data
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data-cephfs
