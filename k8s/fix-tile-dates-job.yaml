---
# Job: Re-fetch 524 genuinely scrambled tiles.
#
# Scrambled = dates from mixed years, e.g. [fall-2021, spring-2018, fall-2019].
# These are deleted and re-fetched from scratch with correct year alignment.
#   target_year 2018 → autumn=2017 (or 2018 fallback), LPIS 2018
#   target_year 2019 → autumn=2018, LPIS 2019
#
# The 3850 "same-year-2018" tiles (all dates 2018, frame-0 should be 2017)
# are handled separately by patch-autumn-frames-job.yaml using the fixed
# tile_fetch.py (skips DES STAC pre-2018, cloud_threshold=0.30 for tile).
#
# After this job, labels must be rebuilt with build_labels.py.
#
apiVersion: batch/v1
kind: Job
metadata:
  name: fix-tile-dates
  namespace: prithvi-training-default
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 86400   # 24h
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: fixer
          image: python:3.11-slim
          command:
            - /bin/bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              echo "=== Fix tile date inconsistencies ==="
              echo "Started: $(date)"

              apt-get update -qq && apt-get install -y -qq git libgdal-dev gdal-bin > /dev/null 2>&1

              pip install --quiet --no-cache-dir \
                numpy scipy rasterio geopandas shapely requests pyproj \
                httpx pyyaml Pillow pyarrow openeo

              mkdir -p /workspace && cd /workspace
              git clone --depth 1 https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine
              pip install --no-cache-dir -e . --no-deps 2>/dev/null || true

              DATA_DIR=/data/unified_v2
              echo "Tiles in $DATA_DIR: $(ls $DATA_DIR/tile_*.npz 2>/dev/null | wc -l)"

              # ── Step 1: Use pre-computed lists from PVC (or re-generate) ────
              echo ""
              echo "=== Step 1: Load fix lists ==="
              if [ -f /data/refetch_list.json ]; then
                cp /data/refetch_list.json /tmp/refetch_list.json
                echo "  Using pre-computed list from /data/"
              else
                echo "  Generating list (not found on PVC)..."
                python3 /workspace/imintengine/scripts/analyze_date_issues.py \
                  --data-dir $DATA_DIR \
                  --refetch-out /tmp/refetch_list.json \
                  --patch-out   /tmp/patch_list.json
              fi
              echo "  refetch: $(python3 -c "import json; print(len(json.load(open('/tmp/refetch_list.json'))))")"

              # ── Re-fetch scrambled tiles ────────────────────────────────────
              echo ""
              echo "=== Delete + re-fetch 524 scrambled tiles ==="

              # Delete the inconsistent tiles so refetch skips don't trigger
              python3 - <<'PYEOF'
              import json
              from pathlib import Path
              DATA = Path("/data/unified_v2")
              tiles = json.load(open("/tmp/refetch_list.json"))
              removed = 0
              for t in tiles:
                  p = DATA / f"{t['name']}.npz"
                  if p.exists():
                      p.unlink()
                      removed += 1
              print(f"Removed {removed} scrambled tiles from {DATA}")
              PYEOF

              python3 /workspace/imintengine/scripts/fetch_unified_tiles.py \
                --mode refetch \
                --from-json /tmp/refetch_list.json \
                --output-dir $DATA_DIR \
                --years 2018 2019 2022 2023 \
                --workers 6 \
                --cloud-max 30

              echo ""
              echo "=== All done: $(date) ==="
              echo "Run build_labels.py next to rebuild labels for refetched tiles."

          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: CDSE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: cdse-credentials
                  key: client_id
                  optional: true
            - name: CDSE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cdse-credentials
                  key: client_secret
                  optional: true
            - name: DES_USER
              valueFrom:
                secretKeyRef:
                  name: des-credentials
                  key: user
                  optional: true
            - name: DES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: des-credentials
                  key: password
                  optional: true
          resources:
            requests:
              cpu: "6"
              memory: "12Gi"
            limits:
              cpu: "6"
              memory: "12Gi"
          volumeMounts:
            - name: training-data
              mountPath: /data
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data
