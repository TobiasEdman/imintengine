apiVersion: batch/v1
kind: Job
metadata:
  name: orphan-aux-skg
  namespace: prithvi-training-default
  labels:
    app: ensemble-prep
    purpose: orphan-aux-skg
spec:
  backoffLimit: 1
  # Orphan-512 QC remediation: backfill the four SKG forestry channels
  # (height/volume/basal_area/diameter) that campaign-orphan-512 silently
  # skipped on EVERY tile (0/1135). Root cause: .skg_endpoints is
  # gitignored and the campaign yaml set no SKG_GRUNDDATA_URL, so
  # _get_grunddata_url() raised per call and fetch_aux_channels'
  # per-channel except swallowed it — dem/markfukt (env-free endpoints)
  # landed, skg never did. This Job mounts the skg-endpoints Secret the
  # way refetch-recoreg-aux-free did.
  #
  # No --force: all four channels are absent everywhere, so the
  # fill-missing default is exactly right and the Job is idempotent.
  # dem/markfukt/vpp are NOT touched (already present/handled).
  #
  # WRITER EXCLUSIVITY: rewrites staging npz atomically — do not run
  # concurrently with spot-fix refetch or build-labels on the same dir.
  activeDeadlineSeconds: 21600   # 6 h — 1135 tiles x 4 channels, free webservice
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: ensemble-prep
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  # p02r09srv04 + srv06 fail pod-sandbox creation (runc bug)
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: ["p02r09srv04", "p02r09srv06"]
      containers:
        - name: aux
          image: python:3.11-slim
          command:
            - bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              echo "=== orphan staging: backfill SKG forestry aux (4 channels) ==="
              echo "Started: $(date)"
              apt-get update -qq && apt-get install -y -qq \
                git libexpat1 libgdal-dev gdal-bin > /dev/null 2>&1
              pip install --quiet --no-cache-dir \
                numpy scipy rasterio requests pyproj Pillow 2>&1 | tail -1

              mkdir -p /workspace && cd /workspace
              git clone --depth 1 --branch main \
                https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine
              export PYTHONPATH=/workspace/imintengine:${PYTHONPATH:-}
              echo "CLONED main HEAD: $(git rev-parse --short HEAD)"
              cp /etc/skg/skg_endpoints /workspace/imintengine/.skg_endpoints

              echo ""
              echo "Tiles: $(ls /data/unified_v2_512_orphans_staging/*.npz 2>/dev/null | wc -l)"
              python3 scripts/prefetch_aux.py \
                --data-dir /data/unified_v2_512_orphans_staging \
                --channels height volume basal_area diameter \
                --workers 8

              echo ""
              echo "=== post-check: corr(volume, height) on 3 tiles (want ~0.6-0.8) ==="
              python3 - <<'PYEOF'
              import glob, numpy as np
              def corr(a, b):
                  a = a.astype(float); b = b.astype(float)
                  m = np.isfinite(a) & np.isfinite(b) & (a != 0) & (b != 0)
                  if m.sum() < 200: return float("nan")
                  ac = a[m]-a[m].mean(); bc = b[m]-b[m].mean()
                  d = np.sqrt((ac*ac).sum()*(bc*bc).sum())
                  return float((ac*bc).sum()/d) if d else float("nan")
              n = 0
              for p in sorted(glob.glob("/data/unified_v2_512_orphans_staging/*.npz")):
                  if n >= 3: break
                  with np.load(p, allow_pickle=True) as z:
                      if "volume" not in z.files or "height" not in z.files:
                          continue
                      c = corr(z["volume"], z["height"])
                  print(f"  {p.split('/')[-1]}: corr(volume,height)={c:.3f}")
                  n += 1
              assert n == 3, "fewer than 3 tiles carry volume+height after backfill"
              print("POST-CHECK DONE")
              PYEOF
              echo "=== done: $(date) ==="
              echo 'CAMPAIGN_GATE_VERDICT={"gate":"orphan-aux-skg","ok":true,"reason":"SKG aux backfill complete"}'
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "8"
              memory: "16Gi"
            limits:
              cpu: "8"
              memory: "16Gi"
          volumeMounts:
            - name: training-data
              mountPath: /data
            - name: skg-endpoints
              mountPath: /etc/skg
              readOnly: true
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data-cephfs
        - name: skg-endpoints
          secret:
            secretName: skg-endpoints
