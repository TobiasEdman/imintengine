apiVersion: batch/v1
kind: Job
metadata:
  name: enrich-512-vpp
  namespace: prithvi-training-default
  labels:
    app: ensemble-prep
    purpose: enrich-512-with-vpp-phenology
spec:
  backoffLimit: 1
  # Year-matched VPP enrichment of the 512 dataset, ONE year per run.
  # Set VPP_YEAR (env below) to the year being processed; prefetch_aux
  # --year keeps only that year's tiles and overwrites their VPP. Reads
  # the WEkEO COG cache (VPP_SOURCE=wekeo); --no-cache because the vpp
  # disk cache is bbox-keyed, not year-keyed. Run years one at a time.
  activeDeadlineSeconds: 14400
  template:
    metadata:
      labels:
        app: ensemble-prep
    spec:
      restartPolicy: Never
      containers:
        - name: e
          image: python:3.11-slim
          command:
            - bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              echo "=== enrich 512 with VPP phenology (Season 1) ==="
              echo "Started: $(date)"

              apt-get update -qq && apt-get install -y -qq \
                git libexpat1 libgdal-dev gdal-bin > /dev/null 2>&1
              pip install --quiet --no-cache-dir \
                numpy scipy rasterio requests pyproj Pillow

              mkdir -p /workspace && cd /workspace
              git clone --depth 1 \
                https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine
              pip install --no-cache-dir -e . --no-deps 2>/dev/null || true
              export PYTHONPATH=/workspace/imintengine:${PYTHONPATH:-}

              echo ""
              echo "Tile inventory:"
              echo "  /data/unified_v2_512: $(ls /data/unified_v2_512/*.npz 2>/dev/null | wc -l) tiles"

              # VPP only. VPP_SOURCE=wekeo (env below) reads straight from
              # the prefetched WEkEO COG cache at /data/vpp_wekeo — the
              # CDSE Sentinel Hub PU quota is exhausted, so CDSE is skipped
              # entirely (no doomed per-tile request + retries).
              echo ""
              echo "Running prefetch_aux --channels vpp --year ${VPP_YEAR} ..."
              python scripts/prefetch_aux.py \
                --data-dir /data/unified_v2_512 \
                --channels vpp \
                --year "${VPP_YEAR}" \
                --no-cache \
                --workers 4

              echo ""
              echo "=== Done: $(date) ==="
              python3 -c "
              import numpy as np, glob
              files = sorted(glob.glob('/data/unified_v2_512/*.npz'))[:5]
              for f in files:
                  d = np.load(f, allow_pickle=True)
                  found = [k for k in ['vpp_sosd','vpp_eosd','vpp_length','vpp_maxv','vpp_minv'] if k in d]
                  print(f'  {f.split(\"/\")[-1]}: {found}')
              "

          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            # Read straight from the prefetched WEkEO cache — CDSE quota
            # is exhausted. VPP_WEKEO_DIR defaults to /data/vpp_wekeo,
            # which is on this same (training-data-cephfs) PVC.
            - name: VPP_SOURCE
              value: "wekeo"
            # The year being processed — edit per run (one year at a
            # time). The WEkEO cache must hold this year's COGs.
            - name: VPP_YEAR
              value: "2021"
          resources:
            requests:
              cpu: "8"
              memory: "16Gi"
            limits:
              cpu: "8"
              memory: "16Gi"
          volumeMounts:
            - name: training-data
              mountPath: /data
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data-cephfs
