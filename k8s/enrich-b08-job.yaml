apiVersion: batch/v1
kind: Job
metadata:
  name: enrich-b08
  namespace: prithvi-training-default
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 172800  # 48h
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: enricher
          image: python:3.11-slim
          command:
            - /bin/bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              echo "=== B08 Enrichment ==="

              apt-get update -qq && apt-get install -y -qq git libgdal-dev gdal-bin > /dev/null 2>&1
              pip install --quiet --no-cache-dir numpy scipy rasterio requests pyproj pyyaml Pillow httpx openeo

              mkdir -p /workspace && cd /workspace
              git clone --depth 1 https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine
              pip install --no-cache-dir -e . --no-deps 2>/dev/null || true

              python scripts/enrich_tiles_b08.py \
                --data-dir /data/unified_v2_512 \
                --workers 6 \
                --skip-existing

          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            # Hämtar B08 via DES openEO — CDSE PU-kvot slut.
            - name: DES_USER
              valueFrom:
                secretKeyRef:
                  name: des-credentials
                  key: user
                  optional: true
            - name: DES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: des-credentials
                  key: password
                  optional: true
          resources:
            requests:
              cpu: "6"
              memory: "12Gi"
            limits:
              cpu: "6"
              memory: "12Gi"
          volumeMounts:
            - name: training-data
              mountPath: /data
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data-cephfs
