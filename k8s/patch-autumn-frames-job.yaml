---
# Job: Patch frame-0 (autumn y-1) for 3,850 same-year-2018 tiles.
#
# These tiles have all 4 dates from 2018 because the DES STAC endpoint
# (explorer.digitalearth.se) only indexes S2 from 2018 onward, causing
# the 2017 fetch to fall back to sparse synthetic candidates + a strict
# 15% cloud threshold that missed the narrow clear windows.
#
# The fix in tile_fetch.py:
#   1. Skips DES STAC for date_end < 2018-01-01
#   2. Probes every 3 days (denser) for pre-2018 windows
#   3. Uses cloud_threshold=0.40 for autumn frames (Swedish Oct is cloudy)
#
# This job fetches a real Sep-Oct 2017 scene from CDSE for each tile and
# replaces bands 0..5 (frame 0) in-place. Tiles where no 2017 scene is
# available (extreme cloud cover) are written to /tmp/patch_autumn_failed.json.
#
# After this job, labels must be rebuilt with build_labels.py.
#
apiVersion: batch/v1
kind: Job
metadata:
  name: patch-autumn-frames
  namespace: prithvi-training-default
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 172800   # 48h
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: patcher
          image: python:3.11-slim
          command:
            - /bin/bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              echo "=== Patch autumn frame-0 for same-year-2018 tiles ==="
              echo "Started: $(date)"

              apt-get update -qq && apt-get install -y -qq git libgdal-dev gdal-bin > /dev/null 2>&1

              pip install --quiet --no-cache-dir \
                numpy scipy rasterio geopandas shapely requests pyproj \
                httpx pyyaml Pillow pyarrow openeo

              mkdir -p /workspace && cd /workspace
              git clone --depth 1 https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine
              pip install --no-cache-dir -e . --no-deps 2>/dev/null || true

              DATA_DIR=/data/unified_v2

              # ── Load patch list from PVC (generated by analyze_date_issues.py) ──
              echo ""
              echo "=== Load patch list ==="
              if [ -f /data/patch_list.json ]; then
                cp /data/patch_list.json /tmp/patch_list.json
                echo "  Using pre-computed list from /data/"
              else
                echo "  Generating patch list (not found on PVC)..."
                python3 /workspace/imintengine/scripts/analyze_date_issues.py \
                  --data-dir $DATA_DIR \
                  --refetch-out /tmp/refetch_list_unused.json \
                  --patch-out   /tmp/patch_list.json
              fi
              COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/patch_list.json'))))")
              echo "  patch list: $COUNT tiles"

              # ── Run patch ──────────────────────────────────────────────────────
              echo ""
              echo "=== Patch autumn frame-0 (cloud_threshold=0.40) ==="
              python3 /workspace/imintengine/scripts/patch_autumn_frame.py \
                --patch-list /tmp/patch_list.json \
                --data-dir   $DATA_DIR \
                --fail-log   /tmp/patch_autumn_failed.json \
                --done-log   /tmp/patch_autumn_done.json \
                --workers    6

              echo ""
              DONE=$(python3 -c "import json; print(len(json.load(open('/tmp/patch_autumn_done.json'))))" 2>/dev/null || echo "?")
              FAIL=$(python3 -c "import json; print(len(json.load(open('/tmp/patch_autumn_failed.json'))))" 2>/dev/null || echo "?")
              echo "=== Results: done=$DONE  failed=$FAIL ==="

              # Copy logs to PVC for inspection
              cp /tmp/patch_autumn_done.json   /data/patch_autumn_done.json   2>/dev/null || true
              cp /tmp/patch_autumn_failed.json /data/patch_autumn_failed.json 2>/dev/null || true

              echo ""
              echo "=== All done: $(date) ==="
              echo "Run build_labels.py next to rebuild labels for patched tiles."

          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: CDSE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: cdse-credentials
                  key: client_id
                  optional: true
            - name: CDSE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cdse-credentials
                  key: client_secret
                  optional: true
            - name: DES_USER
              valueFrom:
                secretKeyRef:
                  name: des-credentials
                  key: user
                  optional: true
            - name: DES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: des-credentials
                  key: password
                  optional: true
          resources:
            requests:
              cpu: "6"
              memory: "12Gi"
            limits:
              cpu: "6"
              memory: "12Gi"
          volumeMounts:
            - name: training-data
              mountPath: /data
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data
