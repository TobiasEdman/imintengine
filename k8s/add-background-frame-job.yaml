---
# Job: Add 2016 (or 2015) summer background frame to all ~6,600 unified tiles.
#
# Fetch strategy per tile:
#   1. CDSE Catalog STAC query: list ALL S2A acquisitions in Jun 1–Aug 16
#      (catalogue.dataspace.copernicus.eu/stac — covers 2015+, public)
#   2. Sort by scene cloud % ascending; try up to 5 best candidates
#   3. Each candidate: Sentinel Hub Process API fetch + tile QC
#      (valid_pct > 80 %, cloud_pct < 15 %)
#   4. First passing scene is accepted; fall back to summer 2015 if needed
#   5. On complete failure: write has_frame_2016=0 + zero array (skippable)
#
# Keys added to each .npz:
#   frame_2016          (6,256,256) float32  Prithvi bands
#   frame_2016_date     bytes "YYYY-MM-DD"
#   frame_2016_doy      int32
#   frame_2016_cloud_pct float32
#   frame_2016_year     int32 (2015 or 2016)
#   has_frame_2016      int32 (1=OK, 0=failed)
#
# Idempotent: tiles with has_frame_2016==1 are skipped by default.
# Re-run with --no-skip-existing to force re-fetch.
#
# Estimated runtime: 6,597 tiles × ~8 s/tile ÷ 32 workers ≈ 27 min
#   (8 s = 1 catalog query ~1 s + up to 3 Process API fetches ~2 s each)
#
# Prerequisites:
#   - CDSE_CLIENT_ID / CDSE_CLIENT_SECRET in a k8s secret "cdse-credentials"
#   - PVC "training-data" with /data/unified_v2/ populated
#
apiVersion: batch/v1
kind: Job
metadata:
  name: add-background-frame
  namespace: prithvi-training-default
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 5400    # 90 min safety cap
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: fetcher
          image: python:3.11-slim
          command:
            - /bin/bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              echo "=== Add Background Frame (2016/2015 summer) ==="
              echo "Started: $(date)"

              apt-get update -qq && apt-get install -y -qq git > /dev/null 2>&1

              pip install --quiet --no-cache-dir \
                numpy rasterio pyproj requests

              mkdir -p /workspace && cd /workspace
              git clone --depth 1 https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine
              pip install --no-cache-dir -e . --no-deps 2>/dev/null || true

              echo ""
              echo "Tile inventory:"
              echo "  Tiles: $(ls /data/unified_v2/*.npz 2>/dev/null | wc -l)"
              echo ""

              python scripts/add_background_frame.py \
                --data-dir /data/unified_v2 \
                --workers 32 \
                --primary-year 2016 \
                --fallback-year 2015

              echo ""
              echo "=== Quick QC: sample 5 tiles ==="
              python3 - << 'PYEOF'
              import numpy as np, glob, random, sys
              tiles = glob.glob("/data/unified_v2/*.npz")
              random.shuffle(tiles)
              ok = fail = 0
              for t in tiles[:20]:
                  d = np.load(t, allow_pickle=False)
                  has = int(d.get("has_frame_2016", 0))
                  if has == 1:
                      f = d["frame_2016"]
                      assert f.shape == (6, 256, 256), f"bad shape {f.shape}"
                      assert f.max() > 0, "all zeros"
                      ok += 1
                  else:
                      fail += 1
              print(f"  Sample QC: {ok} OK, {fail} failed/missing")
              if ok == 0:
                  print("WARNING: no tiles with has_frame_2016==1 in sample!")
                  sys.exit(1)
              PYEOF

              echo ""
              echo "=== Done: $(date) ==="

          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: CDSE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: cdse-credentials
                  key: client_id
            - name: CDSE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cdse-credentials
                  key: client_secret
          resources:
            requests:
              cpu: "32"
              memory: "64Gi"
            limits:
              cpu: "32"
              memory: "64Gi"
          volumeMounts:
            - name: training-data
              mountPath: /data
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data
