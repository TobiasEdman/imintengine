apiVersion: batch/v1
kind: Job
metadata:
  name: complete-frame2016-cdse-512-burst
  namespace: prithvi-training-default
  labels:
    app: ensemble-prep
    purpose: frame2016-512-cdse-burst
spec:
  backoffLimit: 0
  # /data/unified_v2_512 has 7114 tiles missing frame_2016 (audit
  # 2026-05-08; 0% coverage). At ~5 PU/fetch × 7114 ≈ 36k PU. The
  # 256 burst used ~12k PU (2381 actual fetches, the rest skipped
  # via has_frame_2016=1 — but those 256 tiles ALSO live in 512's
  # name space). The 512 dataset is cookie-cut from 256 so largely
  # the same tile centers; with skip-existing on the 256-side
  # writes, the 512 run should re-fetch the same ~3000 tiles since
  # each .npz is independent. Budget ~15-20k PU at burst rates.
  activeDeadlineSeconds: 14400
  template:
    metadata:
      labels:
        app: ensemble-prep
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: ["p02r09srv04"]
      containers:
        - name: f
          image: python:3.11-slim
          command:
            - bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              echo "=== frame_2016 CDSE-completion 512 (BURST) ==="
              echo "Started: $(date)"

              apt-get update -qq && apt-get install -y -qq \
                git libgdal-dev gdal-bin > /dev/null 2>&1
              pip install --quiet --no-cache-dir \
                numpy scipy rasterio pyproj requests Pillow

              mkdir -p /workspace && cd /workspace
              git clone --depth 1 \
                https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine
              pip install --no-cache-dir -e . --no-deps 2>/dev/null || true
              export PYTHONPATH=/workspace/imintengine:${PYTHONPATH:-}

              echo ""
              echo "Tile inventory:"
              echo "  /data/unified_v2_512: $(ls /data/unified_v2_512/*.npz 2>/dev/null | wc -l) tiles"

              python scripts/add_background_frame.py \
                --data-dir /data/unified_v2_512 \
                --workers 8

              echo ""
              echo "=== Done: $(date) ==="

          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: CDSE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: cdse-credentials
                  key: client_id
            - name: CDSE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cdse-credentials
                  key: client_secret
          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
            - name: training-data
              mountPath: /data
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data-cephfs
