---
# Job: Train Prithvi pixel-context classifier (23-class unified LULC).
#
# Architecture:
#   Input   : (B, T*6, 32, 32) context patches  (T=5 with 2016 frame, T=4 without)
#   Backbone: Prithvi-EO-2.0-300M (PrithviViT encoder, ~300M params)
#   Readout : [CLS] token from last transformer block
#   Head    : Linear(1024→512) → GELU → Dropout(0.2) → Linear(512→23)
#
# Two-stage training:
#   Stage 1 (5 epochs):  backbone frozen, train head + pos_embed
#   Stage 2 (30 epochs): full fine-tune, backbone LR = 0.1× head LR
#
# NVMe scratch:
#   Tiles are copied from the NFS PVC to the node's local NVMe (/scratch)
#   before training begins.  This eliminates NFS I/O during training and
#   reduces per-epoch time from ~90 min (NFS-bound) to ~30-40 min (GPU-bound).
#   The copy takes ~5-7 min and is skipped if /scratch already has tiles.
#
# Prerequisites:
#   - PVC "training-data" with /data/unified_v2/ containing labelled tiles
#   - PVC "training-checkpoints" for output
#   - Tiles should have has_frame_2016=1 for T=5 training
#     (run add-background-frame job first)
#   - Labels rebuilt via build-labels-v2 job
#
apiVersion: batch/v1
kind: Job
metadata:
  name: train-pixel-v1
  namespace: prithvi-training-default
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 129600   # 36 h — covers full 35-epoch run (~20h) with headroom
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        accelerator: nvidia-h100
      containers:
        - name: trainer
          image: pytorch/pytorch:2.4.0-cuda12.1-cudnn9-runtime
          command:
            - /bin/bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              echo "=== Pixel Classifier Training ==="
              echo "Started: $(date)"
              nvidia-smi || true

              # pytorch/pytorch base image has torch+cuda pre-installed.
              # Only install the non-torch dependencies.
              apt-get update -qq && apt-get install -y -qq git libgdal-dev > /dev/null 2>&1

              pip install --quiet --no-cache-dir \
                timm numpy Pillow scikit-learn scipy rasterio geopandas \
                shapely pyproj huggingface_hub

              mkdir -p /workspace && cd /workspace
              git clone --depth 1 https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine
              pip install --no-cache-dir -e . 2>/dev/null || \
                pip install --quiet --no-cache-dir -r requirements.txt 2>/dev/null || true

              echo ""
              echo "Data inventory:"
              python scripts/check_tiles.py /data/unified_v2 count
              echo ""

              if [ -f /data/unified_v2/train.txt ]; then
                echo "Splits already exist — skipping generate_splits.py"
                wc -l /data/unified_v2/train.txt /data/unified_v2/val.txt
              else
                echo "Generating zone-stratified splits (odlingszoner 1-8) …"
                python scripts/generate_splits.py \
                  --data-dir /data/unified_v2 \
                  --val-frac 0.15 \
                  --test-frac 0.05 \
                  --min-val-per-zone 10
              fi
              echo ""

              # ── Copy tiles to local NVMe scratch ──────────────────────────────
              # The NFS PVC is ~200 MB/s.  The node's local NVMe is 5-7 GB/s.
              # Copying once eliminates I/O wait for all training epochs.
              # Uses 16 parallel cp workers to saturate NFS read bandwidth.
              N_SCRATCH=$(ls /scratch/*.npz 2>/dev/null | wc -l)
              N_NFS=$(find /data/unified_v2 -maxdepth 1 -name "*.npz" ! -name "*.tmp.*" | wc -l)
              if [ "$N_SCRATCH" -eq "$N_NFS" ] && [ "$N_SCRATCH" -gt 0 ]; then
                echo "Scratch already has $N_SCRATCH tiles — skipping copy"
              else
                echo "Copying $N_NFS tiles to local NVMe scratch (16 parallel workers) …"
                time python3 -c "
              import shutil, concurrent.futures, sys
              from pathlib import Path
              tiles = [f for f in Path('/data/unified_v2').glob('*.npz') if '.tmp' not in f.name]
              dst = Path('/scratch')
              dst.mkdir(exist_ok=True)
              def cp(f): shutil.copy2(f, dst / f.name)
              with concurrent.futures.ThreadPoolExecutor(max_workers=16) as ex:
                  list(ex.map(cp, tiles))
              print(f'Copied {len(tiles)} tiles', flush=True)
              "
                echo "Tiles on scratch: $(ls /scratch/*.npz | wc -l)"
              fi
              echo ""

              mkdir -p /checkpoints/pixel_v1

              RESUME_FLAG=""
              if [ -f /checkpoints/pixel_v1/best_model.pt ]; then
                echo "Found existing checkpoint — resuming from /checkpoints/pixel_v1/best_model.pt"
                RESUME_FLAG="--resume-from /checkpoints/pixel_v1/best_model.pt"
              fi

              python scripts/train_pixel.py \
                --data-dir /scratch \
                --split-dir /data/unified_v2 \
                --use-frame-2016 \
                --epochs 35 \
                --stage1-epochs 5 \
                --batch-size 4096 \
                --lr 3e-4 \
                --backbone-lr-factor 0.1 \
                --weight-decay 1e-4 \
                --focal-gamma 2.0 \
                --num-workers 16 \
                --patience 10 \
                --context-px 32 \
                --samples-per-tile 512 \
                --checkpoint-dir /checkpoints/pixel_v1 \
                --log-file /checkpoints/pixel_v1/train_log.json \
                --device cuda \
                --amp \
                --compile \
                $RESUME_FLAG

              echo ""
              echo "=== Done: $(date) ==="
              echo "Checkpoint: $(ls -lh /checkpoints/pixel_v1/best_model.pt 2>/dev/null || echo 'not found')"

          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: HUGGINGFACE_HUB_VERBOSITY
              value: "warning"
          resources:
            requests:
              cpu: "16"
              memory: "64Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "16"
              memory: "64Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: training-data
              mountPath: /data
            - name: checkpoints
              mountPath: /checkpoints
            - name: scratch
              mountPath: /scratch
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data-cephfs
        - name: checkpoints
          persistentVolumeClaim:
            claimName: training-checkpoints
        - name: scratch
          # Node-local NVMe scratch — no size limit, automatically cleaned up
          # when pod terminates.  Used for NFS-free tile access during training.
          emptyDir: {}
        - name: dshm
          # PyTorch DataLoader workers share tensors via /dev/shm.
          # Default k8s pod /dev/shm is 64 MiB — one batch alone is ~500 MB
          # (4096 samples × 30 × 32 × 32 × 4 bytes).  With 16 workers ×
          # prefetch_factor=4 up to ~16 GB may be resident simultaneously.
          # Mount a 16 Gi memory-backed emptyDir to avoid "No space left on
          # device" bus errors.
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
