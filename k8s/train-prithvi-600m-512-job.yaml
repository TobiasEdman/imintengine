apiVersion: batch/v1
kind: Job
metadata:
  name: train-prithvi-600m-512
  namespace: prithvi-training-default
  labels:
    app: unified-training
    purpose: ensemble-prithvi-600m
    dataset: "512"
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 43200   # 12h max (4-frame multitemporal, larger model + input)
  template:
    metadata:
      labels:
        app: unified-training
        purpose: ensemble-prithvi-600m
    spec:
      restartPolicy: Never
      nodeSelector:
        accelerator: nvidia-h100
      containers:
        - name: trainer
          image: python:3.11-slim
          command:
            - /bin/bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1

              echo "=== Ensemble: Prithvi-EO-2.0 600M on 512 dataset ==="
              # 512 dataset lives on the cephfs PVC. patch=14 requires
              # input size divisible by 14 → train at 504 px (center/random
              # crop from 512), giving 36×36 token grid.
              TILE_COUNT=$(ls /cephfs/unified_v2_512/*.npz 2>/dev/null | wc -l)
              echo "Tiles available: $TILE_COUNT"
              if [ "$TILE_COUNT" -lt 100 ]; then
                echo "ERROR: not enough tiles in /cephfs/unified_v2_512/"
                exit 1
              fi

              echo "Installing system deps..."
              apt-get update -qq && apt-get install -y -qq git > /dev/null 2>&1

              echo "Installing Python deps..."
              pip install --quiet --no-cache-dir torch torchvision --index-url https://download.pytorch.org/whl/cu121
              pip install --quiet --no-cache-dir timm numpy scipy scikit-learn huggingface_hub

              echo "Cleaning stale checkpoint temp files..."
              mkdir -p /checkpoints/prithvi_600m_512
              rm -f /checkpoints/prithvi_600m_512/*.pt.tmp 2>/dev/null || true

              echo "Cloning ImintEngine..."
              mkdir -p /workspace && cd /workspace
              git clone --depth 1 https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine
              pip install --no-cache-dir -e . || pip install --quiet --no-cache-dir -r requirements.txt

              # Symlink cached Prithvi 600M weights from training-data PVC
              # if present (the model_cache lives on the 256-set PVC; we
              # mount it read-only at /data for this purpose).
              if [ -f /data/model_cache/Prithvi_EO_V2_600M_TL.pt ]; then
                ln -sf /data/model_cache/Prithvi_EO_V2_600M_TL.pt \
                  /workspace/imintengine/imint/fm/prithvi_mae/Prithvi_EO_V2_600M_TL.pt
                echo "Using cached Prithvi 600M weights from PVC"
              else
                echo "No cached 600M weights at /data/model_cache/ — will download from HF"
              fi
              cd /cephfs

              echo "Starting Prithvi-600M training (504 px, 4-frame)..."
              # batch_size=2 (vs 4 for 300M) because: ~2x params + ~3.9x
              # spatial vs 300M-on-256. 94 GB H100 NVL has plenty of headroom
              # but staying conservative on the first run.
              python /workspace/imintengine/scripts/train_unified.py \
                --backbone-name prithvi_600m \
                --data-dirs /cephfs/unified_v2_512 \
                --checkpoint-dir /checkpoints/prithvi_600m_512 \
                --num-classes 23 \
                --enable-multitemporal \
                --num-temporal-frames 4 \
                --epochs 10 \
                --batch-size 2 \
                --lr 1e-4 \
                --weight-decay 0.35 \
                --unfreeze-layers 6 \
                --backbone-lr-factor 0.1 \
                --loss-type focal_dice \
                --focal-gamma 2.0 \
                --patch-size 504 \
                --img-size 504 \
                --weighting-method sqrt \
                --label-smoothing 0.05 \
                --lovasz-weight 0.3 \
                --patience 20 \
                --num-workers 16 \
                --device cuda
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          # Namespace ResourceQuota: 250Gi mem total, ~170Gi free at submit.
          # Two trainer pods at 80Gi each = 160Gi + ~80Gi existing → 240Gi
          # well within 250Gi cap. CPU 16 cores leaves room for both pods.
          resources:
            requests:
              cpu: "16"
              memory: "80Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "16"
              memory: "80Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: cephfs
              mountPath: /cephfs
            - name: training-data
              mountPath: /data
              readOnly: true       # only used for model_cache symlink
            - name: checkpoints
              mountPath: /checkpoints
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: cephfs
          persistentVolumeClaim:
            claimName: training-data-cephfs
        - name: training-data
          persistentVolumeClaim:
            claimName: training-data
        - name: checkpoints
          persistentVolumeClaim:
            claimName: training-checkpoints
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 32Gi
