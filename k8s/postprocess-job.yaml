apiVersion: batch/v1
kind: Job
metadata:
  name: postprocess
  namespace: prithvi-training-default
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: pp
          image: python:3.11-slim
          command:
            - /bin/bash
            - -c
            - |
              set -e
              export PYTHONUNBUFFERED=1
              apt-get update -qq && apt-get install -y -qq git > /dev/null 2>&1
              pip install -q numpy scipy rasterio geopandas shapely requests pyproj pyyaml

              mkdir -p /workspace && cd /workspace
              git clone --depth 1 https://github.com/TobiasEdman/ImintEngine.git imintengine
              cd /workspace/imintengine
              pip install --no-cache-dir -e . --no-deps 2>/dev/null || true

              echo "=== Post-processing Pipeline ==="
              TILES=$(ls /data/unified_v2/*.npz 2>/dev/null | wc -l)
              echo "Tiles on PVC: $TILES"

              echo ""
              echo "=== Step 1: Label Remapping ==="
              python scripts/remap_labels.py --data-dir /data/unified_v2 --workers 4

              echo ""
              echo "=== Step 2+3+4: Nodata Filter + QC + Class Stats ==="
              python scripts/postprocess_qc.py --data-dir /data/unified_v2

              echo ""
              echo "=== Done ==="
              ls /data/unified_v2/*.npz | wc -l
          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: training-data
