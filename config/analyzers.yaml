# IMINT Engine — Analyzer Configuration
#
# Enable/disable analyzers and adjust parameters.
# The engine loads this file at the start of each run_job() call.

change_detection:
  enabled: true
  threshold: 0.15           # Per-pixel L2 norm difference threshold
  min_region_pixels: 50     # Ignore connected components smaller than this

spectral:
  enabled: true
  ndvi_threshold: 0.3       # NDVI above this = vegetation
  ndwi_threshold: 0.3       # NDWI above this = water
  ndbi_threshold: 0.0       # NDBI above this = built-up

object_detection:
  enabled: true
  mode: heatmap             # "heatmap" (no model) or "model" (requires ultralytics)
  patch_size: 32            # Patch size for variance heatmap
  std_threshold: 2.0        # Standard deviations above mean to flag anomaly
  # model_path: yolov8n.pt  # Uncomment for model mode
  # confidence: 0.25        # Minimum confidence for model detections

prithvi:
  enabled: true
  mode: segmentation
  backbone: prithvi_eo_v2_300m_tl
  task_head: burn_scars
  device: cpu

nmd:
  enabled: true             # NMD LULC analysis (requires DES connection + coords)

samgeo:
  enabled: false            # SAMGeo zero-shot segmentation (requires: pip install segment-geospatial)
  mode: automatic           # "automatic", "points", or "text"
  model_type: vit_h         # "vit_h" (best), "vit_l", "vit_b" (fastest)
  sam_version: 2            # 2 (SAM2, recommended) or 1 (original SAM)
  min_mask_area: 100        # Filter segments smaller than this (pixels)
  # points: [[100,200]]     # Pixel coords for point mode
  # text_prompt: "buildings" # For text mode (requires groundingdino-py)

insar:
  enabled: false            # InSAR ground displacement (requires: pip install mintpy)
  mode: differential        # "velocity", "timeseries", or "differential"
  wavelength: 0.05546       # Sentinel-1 C-band wavelength (meters)
  threshold_mm_yr: 5.0      # Flag pixels above this displacement
  temporal_coherence_threshold: 0.7
  # ifg_dir: /path/to/interferograms  # Required for velocity/timeseries modes
  # reference_point: [59.33, 18.07]   # Stable reference (lat, lon)

water_quality:
  # Sentinel-2 water quality retrieval (Stigfjorden + Skagerrak).
  # Combines two AI methods (MDN, C2RCC) with two classical indices (NDCI, MCI).
  # Outputs: chlorophyll-a / TSS / aCDOM / NDCI / MCI / chlorophyll spread + summary.json.
  enabled: false            # Disabled by default — enable per-job via executor or showcase script
  methods:
    mdn:
      enabled: true
      # First-run download URL for the Pahlevan MDN weight bundle.
      # Cache: ~/.cache/imint/mdn/. Repository: github.com/STREAM-RS/Mixture-Density-Networks
      # Pin to a specific release tag once verified.
      weights_url: null     # e.g. "https://github.com/STREAM-RS/Mixture-Density-Networks/releases/download/v1.0/mdn_pahlevan_2022_s2.pt"
    c2rcc:
      enabled: true         # Requires `pip install acolite` (skip-and-warn if absent)
    ndci:
      enabled: true
    mci:
      enabled: true
  # Hand-drawn polygon (~1.5:1 landscape, projected EPSG:3006) covering Stigfjorden,
  # waters off Mollösund/Käringön, and ~30 km offshore into Skagerrak.
  aoi_geojson: imint/analyzers/water_quality/aoi/stigfjorden_skagerrak.geojson
  bloom_threshold_chl: 5.0  # mg/m³, used for summary.json bloom-area statistics only
