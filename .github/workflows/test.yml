name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Allow pip to clone private TobiasEdman repos (des-contracts).
      # DES_CONTRACTS_TOKEN must be a PAT with `repo` read scope, added
      # as a repo secret. Per agentic_workflow rollout W3.6.
      - name: Configure git for private repo access
        env:
          PAT: ${{ secrets.DES_CONTRACTS_TOKEN }}
        run: |
          if [ -n "$PAT" ]; then
            git config --global url."https://${PAT}@github.com/".insteadOf "https://github.com/"
          else
            echo "::warning::DES_CONTRACTS_TOKEN secret not set; private deps will fail to clone."
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v
